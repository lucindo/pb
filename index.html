<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <!-- PWA: plugin auto-injects the manifest link at build time — DO NOT add it here manually -->
    <!-- iOS install icon — MUST use %BASE_URL% (Phase 12 D-04 pattern) -->
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" sizes="180x180">
    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="HRV Breathing">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Chrome/Android browser tab + PWA theme color -->
    <meta name="theme-color" content="#5e81ac">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Phase 16 THEME-04: pre-paint theme attribute. SYNC WITH src/storage/storage.ts STATE_KEY. -->
    <!-- SYNC WITH src/styles/faviconPalette.ts FAVICON_COLORS / src/styles/theme.css --color-breathing-accent-strong -->
    <script>(function(){function favUri(h){return 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="12.4" fill="none" stroke="'+h+'" stroke-width="2.4" stroke-opacity="0.5"/><circle cx="16" cy="16" r="7.6" fill="none" stroke="'+h+'" stroke-width="2.4"/><circle cx="16" cy="16" r="3.5" fill="'+h+'"/></svg>');}function setFav(u){var o=document.querySelector('link[rel="icon"]');var n=document.createElement('link');n.rel='icon';n.type='image/svg+xml';n.setAttribute('href',u);if(o){o.remove();}if(document.head){document.head.appendChild(n);}}try{var raw=localStorage.getItem('hrv:state:v1');var t=raw&&(JSON.parse(raw).prefs||{}).theme;if(t==='system'||!t||['light','dark'].indexOf(t)<0){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);var c={'light':'#5e81ac','dark':'#81a1c1'};var h=c[t]||c['light'];setFav(favUri(h));}catch(_){document.documentElement.setAttribute('data-theme','light');setFav(favUri('#5e81ac'));}})();</script>
    <title>HRV Breathing</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
