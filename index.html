<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <!-- PWA: plugin auto-injects the manifest link at build time — DO NOT add it here manually -->
    <!-- iOS install icon — MUST use %BASE_URL% (Phase 12 D-04 pattern) -->
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" sizes="180x180">
    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pattern Breathing">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Chrome/Android browser tab + PWA theme color -->
    <meta name="theme-color" content="#414957">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <!-- Phase 16 THEME-04: pre-paint theme attribute. SYNC WITH src/storage/storage.ts STATE_KEY.
         The hardcoded 'pattern-breathing:state:v1' literal and the JSON.parse(...).prefs.theme path below MUST
         track src/storage/storage.ts STATE_KEY and the prefs subtree location. The link is
         hand-maintained — no build-time check catches a desync. Symptoms of a desync: every
         returning user sees a data-theme="light" flash on every load (silent D-17 fallback). -->
    <!-- SYNC WITH src/styles/faviconPalette.ts FAVICON_COLORS / src/styles/theme.css --color-breathing-accent-strong -->
    <script>(function(){function favUri(h){return 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="'+h+'" stroke-linecap="round"><circle cx="16" cy="16" r="10.5" stroke-width="2.5" stroke-opacity="0.3"/><path d="M16 5.5A10.5 10.5 0 1 1 5.5 16" stroke-width="3.5"/></svg>');}function setFav(u){var o=document.querySelector('link[rel="icon"]');var n=document.createElement('link');n.rel='icon';n.type='image/svg+xml';n.setAttribute('href',u);if(o){o.remove();}if(document.head){document.head.appendChild(n);}}try{var raw=localStorage.getItem('pattern-breathing:state:v1');var t=raw&&(JSON.parse(raw).prefs||{}).theme;if(t==='system'||!t||['light','dark'].indexOf(t)<0){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);var c={'light':'#414957','dark':'#ccd0d9'};var h=c[t]||c['light'];setFav(favUri(h));}catch(_){document.documentElement.setAttribute('data-theme','light');setFav(favUri('#414957'));}})();</script>
    <title>Pattern Breathing</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
