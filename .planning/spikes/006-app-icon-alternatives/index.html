<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike 006 — App Icon Alternatives</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
  <div id="root"></div>

  <script type="module">
    import React, { useState } from 'https://esm.sh/react@19.0.0'
    import { createRoot } from 'https://esm.sh/react-dom@19.0.0/client'
    import htm from 'https://esm.sh/htm@3.1.1'
    const html = htm.bind(React.createElement)

    // ───────────────────────────────────────────────────────────────
    // App icon candidates — each is an SVG (viewBox 0 0 512 512) with a
    // background + a meditation-themed glyph. The installed PWA today is
    // the "Current" glowing orb (public/pwa-512x512.png). All glyphs are
    // kept inside the central ~70% so they survive the Android maskable
    // circle crop (safe zone = inner 80%).
    // ───────────────────────────────────────────────────────────────

    const CENTER = 256

    // 8 evenly-spaced rays around (cx,cy) — the radiant "sun".
    function rays(cx, cy, rIn, rOut, color, w) {
      let s = ''
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4
        s += `<line x1="${(cx + rIn * Math.cos(a)).toFixed(1)}" y1="${(cy + rIn * Math.sin(a)).toFixed(1)}" `
          + `x2="${(cx + rOut * Math.cos(a)).toFixed(1)}" y2="${(cy + rOut * Math.sin(a)).toFixed(1)}" `
          + `stroke="${color}" stroke-width="${w}" stroke-linecap="round"/>`
      }
      return s
    }

    function bgRect(uid, c) {
      return `<defs><radialGradient id="bg${uid}" cx="50%" cy="38%" r="78%">`
        + `<stop offset="0%" stop-color="${c.bgFrom}"/>`
        + `<stop offset="100%" stop-color="${c.bgTo}"/></radialGradient></defs>`
        + `<rect width="512" height="512" fill="url(#bg${uid})"/>`
    }

    const wrap = (inner) =>
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" style="display:block">${inner}</svg>`

    const CANDIDATES = [
      {
        id: 'current', name: 'Current', tag: 'baseline', fixedColor: true,
        desc: 'The glowing orb shipping today — a soft blue radial gradient on charcoal. The app’s breathing-orb motif.',
        svg: (c, uid) => wrap(
          `<defs><radialGradient id="orb${uid}" cx="50%" cy="42%" r="62%">`
          + `<stop offset="0%" stop-color="#d3ecf2"/>`
          + `<stop offset="32%" stop-color="#88c0d0"/>`
          + `<stop offset="100%" stop-color="#5e81ac"/></radialGradient></defs>`
          + `<rect width="512" height="512" fill="#2e3440"/>`
          + `<circle cx="256" cy="256" r="172" fill="url(#orb${uid})"/>`,
        ),
      },
      {
        id: 'totem-line', name: 'Totem · line', tag: 'reference',
        desc: 'Your reference glyph, faithful airy line-art — a cradling crescent, a radiant sun, a seated arch.',
        svg: (c, uid) => wrap(
          bgRect(uid, c)
          + `<g fill="none" stroke="${c.glyph}" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">`
          + `<path d="M132 178 Q256 300 380 178"/>`            // crescent cradle
          + `<circle cx="256" cy="262" r="22"/>`               // sun core
          + `<path d="M182 408 L182 350 A74 74 0 0 1 330 350 L330 408"/>` // arch
          + `</g>`
          + rays(256, 262, 34, 52, c.glyph, 12),               // sun rays
        ),
      },
      {
        id: 'totem-solid', name: 'Totem · solid', tag: 'reference',
        desc: 'The same glyph with weighted, filled strokes — holds up better when the icon is shrunk small.',
        svg: (c, uid) => wrap(
          bgRect(uid, c)
          + `<path d="M120 172 Q256 322 392 172 Q256 250 120 172 Z" fill="${c.glyph}"/>` // crescent band
          + `<circle cx="256" cy="266" r="27" fill="${c.glyph}"/>`                        // sun disc
          + rays(256, 266, 40, 58, c.glyph, 15)
          + `<path d="M184 410 L184 352 A72 72 0 0 1 328 352 L328 410" fill="none" `
          + `stroke="${c.glyph}" stroke-width="34" stroke-linecap="round"/>`,             // arch band
        ),
      },
      {
        id: 'crescent-sun', name: 'Crescent + sun', tag: 'alternative',
        desc: 'A simplified, calmer take — the moon cradling a radiant sun. Drops the arch; scales cleanly to tiny sizes.',
        svg: (c, uid) => wrap(
          bgRect(uid, c)
          + `<path d="M104 196 Q256 372 408 196 Q256 286 104 196 Z" fill="${c.glyph}"/>`  // big crescent
          + `<circle cx="256" cy="322" r="48" fill="${c.accent}"/>`                       // sun disc
          + rays(256, 322, 64, 92, c.accent, 16),
        ),
      },
      {
        id: 'lotus', name: 'Lotus', tag: 'alternative',
        desc: 'A minimal five-petal lotus bloom — the classic meditation motif, rendered clean and symmetric.',
        svg: (c, uid) => {
          const petal = 'M256 388 C198 300 206 208 256 150 C306 208 314 300 256 388 Z'
          const rot = (a, op) => `<path d="${petal}" fill="${c.glyph}" fill-opacity="${op}" transform="rotate(${a} 256 388)"/>`
          return wrap(
            bgRect(uid, c)
            + rot(-70, 0.55) + rot(70, 0.55)
            + rot(-35, 0.8) + rot(35, 0.8)
            + rot(0, 1)
            + `<circle cx="256" cy="388" r="15" fill="${c.glyph}"/>`,
          )
        },
      },
      {
        id: 'rings', name: 'Breathing rings', tag: 'alternative',
        desc: 'Concentric rings expanding outward — echoes the app’s breathing orb growing and shrinking with each breath.',
        svg: (c, uid) => wrap(
          bgRect(uid, c)
          + `<g fill="none" stroke="${c.glyph}" stroke-width="13">`
          + `<circle cx="256" cy="256" r="200" stroke-opacity="0.24"/>`
          + `<circle cx="256" cy="256" r="152" stroke-opacity="0.42"/>`
          + `<circle cx="256" cy="256" r="104" stroke-opacity="0.66"/>`
          + `</g>`
          + `<circle cx="256" cy="256" r="46" fill="${c.accent}"/>`,
        ),
      },
      {
        id: 'enso', name: 'Ensō', tag: 'alternative',
        desc: 'A single open zen brush-ring — stillness and the unfinished circle. Echoes the orb as one calm stroke.',
        svg: (c, uid) => wrap(
          bgRect(uid, c)
          + `<path d="M386 181 A150 150 0 1 1 393 311" fill="none" stroke="${c.glyph}" `
          + `stroke-width="33" stroke-linecap="round"/>`,
        ),
      },
    ]

    const PALETTES = {
      dark:  { bgFrom: '#3b4252', bgTo: '#2b303b', glyph: '#e6eef3', accent: '#9fc6d6' },
      light: { bgFrom: '#eef1f6', bgTo: '#dbe2ec', glyph: '#3b4252', accent: '#5e81ac' },
    }

    // Mask = how the OS crops the installed icon.
    const MASK_RADII = { ios: '22.4%', android: '50%', square: '8%' }

    // ───────────────────────────────────────────────────────────────
    function Icon({ candidate, palette, size, mask, safeZone, uidKey }) {
      const colors = candidate.fixedColor ? PALETTES.dark : palette
      const svg = candidate.svg(colors, uidKey)
      return html`
        <div style=${{ position: 'relative', width: size + 'px', height: size + 'px', flex: 'none' }}>
          <div
            style=${{
              width: '100%', height: '100%', overflow: 'hidden',
              borderRadius: MASK_RADII[mask],
              boxShadow: '0 4px 14px rgba(0,0,0,0.45)',
            }}
            dangerouslySetInnerHTML=${{ __html: svg }}
          ></div>
          ${safeZone ? html`
            <div style=${{
              position: 'absolute', left: '10%', top: '10%', width: '80%', height: '80%',
              borderRadius: '50%', border: '2px dashed rgba(245,158,11,0.85)',
              pointerEvents: 'none',
            }}></div>` : null}
        </div>`
    }

    function App() {
      const [mask, setMask] = useState('ios')
      const [tone, setTone] = useState('dark')        // glyph/bg tone
      const [safeZone, setSafeZone] = useState(false)
      const [wallpaper, setWallpaper] = useState('dark')
      const [picked, setPicked] = useState({ current: true })

      const palette = PALETTES[tone]
      const pickedList = CANDIDATES.filter((c) => picked[c.id])
      const heroIcon = pickedList[0] || CANDIDATES[0]

      const Seg = ({ value, current, set, children }) => html`
        <button onClick=${() => set(value)}
          class=${'px-3 py-1 rounded-md text-[12px] transition-colors '
            + (value === current ? 'bg-cyan-600 text-slate-950 font-medium' : 'bg-slate-800 text-slate-300 hover:bg-slate-700')}>
          ${children}
        </button>`

      const wallBg = wallpaper === 'dark'
        ? 'linear-gradient(160deg,#1c2230,#2b3344 60%,#3a4a52)'
        : 'linear-gradient(160deg,#cdd9e6,#e6ebf2 55%,#f1e9df)'

      return html`
        <div class="min-h-screen">
          <div class="bg-black/80 border-b border-amber-500/30 px-4 py-1.5 text-[11px] tracking-wide text-amber-400/80 font-mono">
            SPIKE HARNESS · 006-app-icon-alternatives · not shipped UI — an icon-design workbench
          </div>

          <div class="max-w-4xl mx-auto px-5 py-8">
            <header class="mb-6">
              <h1 class="text-2xl font-semibold text-slate-100">App icon alternatives</h1>
              <p class="mt-2 text-sm text-slate-400 leading-relaxed">
                The icon shown when the app is installed to a home screen. Candidates are
                meditation-themed; the two <span class="text-slate-300">Totem</span> variants recreate
                your reference glyph. Each is rendered as a real installed icon — switch the OS mask
                (iOS rounded tile / Android circle), flip the tone, and turn on the maskable
                <span class="text-amber-400/90">safe-zone</span> ring to check nothing important gets cropped.
              </p>
            </header>

            <!-- controls -->
            <div class="flex flex-wrap gap-x-6 gap-y-3 mb-7 p-3 rounded-lg border border-slate-800 bg-slate-900/60">
              <div class="flex items-center gap-2">
                <span class="text-[11px] uppercase tracking-wider text-slate-500">Mask</span>
                ${Seg({ value: 'ios', current: mask, set: setMask, children: 'iOS tile' })}
                ${Seg({ value: 'android', current: mask, set: setMask, children: 'Android circle' })}
                ${Seg({ value: 'square', current: mask, set: setMask, children: 'Square' })}
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[11px] uppercase tracking-wider text-slate-500">Tone</span>
                ${Seg({ value: 'dark', current: tone, set: setTone, children: 'Pale on deep' })}
                ${Seg({ value: 'light', current: tone, set: setTone, children: 'Dark on light' })}
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[11px] uppercase tracking-wider text-slate-500">Safe zone</span>
                ${Seg({ value: true, current: safeZone, set: setSafeZone, children: 'On' })}
                ${Seg({ value: false, current: safeZone, set: setSafeZone, children: 'Off' })}
              </div>
            </div>

            <!-- candidate grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              ${CANDIDATES.map((cand) => {
                const isPicked = !!picked[cand.id]
                return html`
                  <div key=${cand.id} class=${'rounded-xl border px-4 py-4 flex gap-4 '
                    + (isPicked ? 'border-emerald-500/50 bg-emerald-950/15' : 'border-slate-800 bg-slate-900/60')}>
                    <div class="flex flex-col items-center gap-2">
                      <${Icon} candidate=${cand} palette=${palette} size=${118}
                        mask=${mask} safeZone=${safeZone} uidKey=${cand.id + '-hero'} />
                      <div class="flex items-end gap-2">
                        <${Icon} candidate=${cand} palette=${palette} size=${52}
                          mask=${mask} safeZone=${false} uidKey=${cand.id + '-md'} />
                        <${Icon} candidate=${cand} palette=${palette} size=${32}
                          mask=${mask} safeZone=${false} uidKey=${cand.id + '-sm'} />
                      </div>
                    </div>
                    <div class="min-w-0 flex-1 flex flex-col">
                      <div class="flex items-center gap-2">
                        <span class="font-medium text-slate-100">${cand.name}</span>
                        <span class=${'text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded '
                          + (cand.tag === 'baseline' ? 'bg-slate-700 text-slate-300'
                            : cand.tag === 'reference' ? 'bg-indigo-500/30 text-indigo-300'
                            : 'bg-slate-800 text-slate-400')}>${cand.tag}</span>
                      </div>
                      <p class="mt-1 text-[12.5px] text-slate-400 leading-snug flex-1">${cand.desc}</p>
                      <button onClick=${() => setPicked((p) => ({ ...p, [cand.id]: !p[cand.id] }))}
                        class=${'mt-2 self-start text-[11px] px-2.5 py-1 rounded-md border transition-colors '
                          + (isPicked ? 'border-emerald-500/60 bg-emerald-500/15 text-emerald-300'
                            : 'border-slate-700 text-slate-500 hover:border-slate-500')}>
                        ${isPicked ? '✓ shortlisted' : '+ shortlist'}
                      </button>
                    </div>
                  </div>`
              })}
            </div>

            <!-- home-screen preview -->
            <div class="mt-8">
              <div class="flex items-center justify-between mb-2">
                <span class="text-xs uppercase tracking-widest text-slate-500">
                  Home-screen preview — ${heroIcon.name}
                </span>
                <div class="flex gap-2">
                  ${Seg({ value: 'dark', current: wallpaper, set: setWallpaper, children: 'Dark wall' })}
                  ${Seg({ value: 'light', current: wallpaper, set: setWallpaper, children: 'Light wall' })}
                </div>
              </div>
              <div class="rounded-2xl p-6 border border-slate-800" style=${{ background: wallBg }}>
                <div class="flex gap-6 flex-wrap">
                  ${[
                    { app: true },
                    { c: '#6b7a8d', l: 'Notes' },
                    { c: '#7d8a6b', l: 'Clock' },
                    { c: '#8d6b7a', l: 'Health' },
                  ].map((tile, i) => html`
                    <div key=${i} class="flex flex-col items-center gap-1.5" style=${{ width: '60px' }}>
                      ${tile.app
                        ? html`<${Icon} candidate=${heroIcon} palette=${palette} size=${60}
                            mask=${mask} safeZone=${false} uidKey=${'home-' + heroIcon.id} />`
                        : html`<div style=${{
                            width: '60px', height: '60px', borderRadius: MASK_RADII[mask],
                            background: tile.c, boxShadow: '0 4px 14px rgba(0,0,0,0.4)',
                          }}></div>`}
                      <span class=${'text-[11px] truncate w-full text-center '
                        + (wallpaper === 'dark' ? 'text-slate-200' : 'text-slate-700')}>
                        ${tile.app ? 'HRV Breathing' : tile.l}
                      </span>
                    </div>`)}
                </div>
              </div>
              ${pickedList.length === 0
                ? html`<p class="mt-2 text-[12px] text-slate-500">Nothing shortlisted — preview shows the Current icon.</p>`
                : null}
            </div>

            <!-- shortlist summary -->
            <div class="mt-6 rounded-xl border border-emerald-700/40 bg-emerald-950/20 px-4 py-3.5">
              <div class="text-xs uppercase tracking-widest text-emerald-400/80 mb-1.5">Shortlisted</div>
              ${pickedList.length === 0
                ? html`<p class="text-sm text-slate-500">Nothing shortlisted. Toggle "+ shortlist" on the icons you like.</p>`
                : html`<p class="text-sm text-slate-200">
                    ${pickedList.map((c) => c.name).join(' · ')}
                    <span class="text-slate-500"> — ${pickedList.length} candidate${pickedList.length === 1 ? '' : 's'}</span>
                  </p>`}
            </div>

            <footer class="mt-8 text-[12px] text-slate-600 leading-relaxed">
              Ships as <span class="text-slate-500 font-mono">public/pwa-192x192.png</span>,
              <span class="text-slate-500 font-mono">pwa-512x512.png</span>,
              <span class="text-slate-500 font-mono">pwa-maskable-*</span> and
              <span class="text-slate-500 font-mono">apple-touch-icon.png</span>, declared in
              <span class="text-slate-500 font-mono">vite.config.ts</span>. The maskable PNGs must keep
              the glyph inside the safe-zone ring. The winning glyph is exported to SVG, then rasterised.
            </footer>
          </div>
        </div>`
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
