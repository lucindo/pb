// ─── Breath engine — shared timing across all shape variants ────────────────
function easeInOutSine(t) {
  return 0.5 - 0.5 * Math.cos(Math.PI * Math.max(0, Math.min(1, t)))
}

const PHASE_MS = 5500     // ≈ 5.5 bpm — one full cycle = 11 s
const MIN_SCALE = 0.62    // mirrors src/components/BreathingShape MIN_SCALE
const MAX_SCALE = 1.00

function useBreathPhase({ active = true }) {
  const [phase, setPhase] = useState('in')
  const [progress, setProgress] = useState(0)
  useEffect(() => {
    if (!active) { setProgress(0); setPhase('in'); return }
    let start = performance.now()
    let raf = 0
    const tick = (now) => {
      const elapsed = now - start
      if (elapsed >= PHASE_MS) {
        start = now - (elapsed - PHASE_MS)
        setPhase(ph => ph === 'in' ? 'out' : 'in')
        setProgress((now - start) / PHASE_MS)
      } else {
        setProgress(elapsed / PHASE_MS)
      }
      raf = requestAnimationFrame(tick)
    }
    raf = requestAnimationFrame(tick)
    return () => cancelAnimationFrame(raf)
  }, [active])
  return { phase, progress }
}

function computeScale(phase, progress) {
  const t = easeInOutSine(progress)
  return phase === 'in'
    ? MIN_SCALE + (MAX_SCALE - MIN_SCALE) * t
    : MAX_SCALE - (MAX_SCALE - MIN_SCALE) * t
}

// ─── Shape variants — each preserves the end-of-phase ring cue ──────────────
//
//   - Outer cue : always-visible boundary marking end-of-inhale (full extent)
//   - Inner cue : visible only during exhale, marking end-of-exhale (rest position)
//
// All variants share the same useBreathPhase clock so the operator can flip between
// them mid-breath and the cycle stays in sync.

function VariantOrbHalo({ candidate, scale, phase, small, large, label, marker, showRings = true }) {
  const t = candidate.tokens
  const tp = TYPOGRAPHY
  const size = large ? 320 : small ? 170 : 240
  const halos = [
    { pct: 1.00, color: t.orbHalo1, radius: '48% 52% 51% 49% / 50% 49% 51% 50%', shift: [-4,  2] },
    { pct: 0.86, color: t.orbHalo2, radius: '52% 48% 49% 51% / 49% 52% 48% 51%', shift: [ 3, -2] },
    { pct: 0.74, color: t.orbHalo3, radius: '50% 50% 53% 47% / 51% 49% 51% 49%', shift: [-1,  3] },
  ]
  const discPct = 0.62
  const discSize = Math.round(size * discPct)
  const labelPx = large ? 46 : small ? 22 : 34
  const innerVisible = phase === 'out' ? 1 : 0
  const innerPx = Math.round(size * MIN_SCALE)
  return html`
    <div class="relative" style=${{ width: size, height: size }}>
      ${showRings && html`
        <div class="absolute" style=${{ inset: 0, border: `1.5px solid ${t.accent}`, borderRadius: '50%', opacity: 0.45 }}></div>
        <div class="absolute" style=${{
          width: innerPx, height: innerPx,
          top: '50%', left: '50%', transform: 'translate(-50%, -50%)',

function VariantRipple({ candidate, scale, phase, small, label, marker, showRings = true }) {
  const t = candidate.tokens
  const tp = TYPOGRAPHY
  const size = small ? 170 : 240
  const discPct = 0.42
  const discSize = Math.round(size * discPct)
  const labelPx = small ? 18 : 26
  const innerVisible = phase === 'out' ? 1 : 0
  const innerPx = Math.round(size * MIN_SCALE)
  // Intermediate ripple rings — scale with breath, opacity fades outward.
  const rings = [
    { basePct: 0.55, opacity: 0.45 },
    { basePct: 0.75, opacity: 0.30 },
    { basePct: 0.95, opacity: 0.18 },
  ]
  // Disc grows subtly from 85% → 100% of base across the breath.
  const discScale = 0.85 + 0.20 * ((scale - MIN_SCALE) / (MAX_SCALE - MIN_SCALE))
  return html`
    <div class="relative" style=${{ width: size, height: size }}>
      ${showRings && html`
        <div class="absolute" style=${{ inset: 0, border: `1.5px solid ${t.accent}`, borderRadius: '50%', opacity: 0.5 }}></div>
        <div class="absolute" style=${{
          width: innerPx, height: innerPx,
          top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
          border: `1.5px solid ${t.accent}`, borderRadius: '50%',
          opacity: innerVisible * 0.5, transition: 'opacity 600ms ease',
        }}></div>
      `}
      ${rings.map((r, i) => {
        const px = Math.round(size * r.basePct * scale)
        return html`
          <div key=${i} class="absolute" style=${{
            width: px, height: px,
            top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
            border: `1px solid ${t.accent}`, borderRadius: '50%',
            opacity: r.opacity,
          }}></div>
        `
      })}
      <div class="absolute flex items-center justify-center" style=${{
        width: discSize, height: discSize,
        top: '50%', left: '50%',
        transform: `translate(-50%, -50%) scale(${discScale})`,
        borderRadius: '50%',
        background: t.accent,
        color: t.onAccent,
        fontFamily: tp.headingFamily,
        fontWeight: tp.headingWeight,
        fontSize: labelPx,
        letterSpacing: '0.02em',
      }}>${marker || label || ''}</div>
    </div>
  `
}

// Dispatcher — chooses a variant + drives it from the shared breath clock.
// `showRings` defaults true; the IdleScreen and CompleteScreen pass `false` so the
// targeting cues don't render outside an active session.
function BreathingOrb({ candidate, small = false, large = false, label = null, animate = true, marker = null, shapeVariant = 'orb-halo', showRings = true }) {
  const { phase, progress } = useBreathPhase({ active: animate })
  const scale = computeScale(phase, progress)
  const Variant = SHAPE_VARIANTS.find(v => v.id === shapeVariant) || SHAPE_VARIANTS[0]
  return Variant.render({ candidate, scale, phase, progress, small, large, label, marker, showRings })
}

function ToggleSwitch({ candidate, value, onChange, ariaLabel }) {
  const t = candidate.tokens
  return html`
    <button
      role="switch"
      aria-checked=${value}
      aria-label=${ariaLabel}
      onClick=${() => onChange(!value)}
      class="relative rounded-full transition-all"
      style=${{
        width: 44, height: 24,
        background: value ? t.accent : t.bgSoft,
        border: `1px solid ${value ? 'transparent' : t.borderSoft}`,
      }}
    >
      <span style=${{
        position: 'absolute', top: 1,
        width: 20, height: 20, borderRadius: '50%',
        background: value ? t.onAccent : t.muted,
        left: value ? 21 : 2,
        transition: 'left 180ms ease',
        boxShadow: '0 1px 2px rgba(0,0,0,0.15)',
      }}></span>
    </button>
  `
}

function Stepper({ candidate, label, value, onChange, unit, step = 1, min = 1, max = 999 }) {
  const t = candidate.tokens
  const tp = TYPOGRAPHY
  const dec = () => onChange(Math.max(min, +(value - step).toFixed(2)))
  const inc = () => onChange(Math.min(max, +(value + step).toFixed(2)))
  return html`
    <div class="flex items-center justify-between py-3"
         style=${{ borderTop: `1px solid ${t.borderSoft}` }}>
      <span style=${{ color: t.text, fontFamily: tp.bodyFamily, fontWeight: 400, fontSize: 15 }}>${label}</span>
      <div class="flex items-center gap-2">
        <button onClick=${dec} class="rounded-full flex items-center justify-center"
                style=${{ width: 32, height: 32, background: 'transparent', border: `1px solid ${t.borderSoft}`, color: t.text, fontSize: 18, lineHeight: 1 }}
                aria-label=${`Decrease ${label}`}>−</button>
        <div class="text-center" style=${{ minWidth: 72, fontFamily: tp.bodyFamily, fontWeight: 500, fontSize: 16, color: t.text, fontVariantNumeric: 'tabular-nums' }}>
          ${value}<span style=${{ color: t.muted, marginLeft: 4, fontSize: 12 }}>${unit}</span>
        </div>
        <button onClick=${inc} class="rounded-full flex items-center justify-center"
                style=${{ width: 32, height: 32, background: 'transparent', border: `1px solid ${t.borderSoft}`, color: t.text, fontSize: 18, lineHeight: 1 }}
                aria-label=${`Increase ${label}`}>+</button>
      </div>
    </div>
  `
}

function SegmentedControl({ candidate, label, options, value, onChange }) {
  const t = candidate.tokens
  const tp = TYPOGRAPHY
  return html`
    <div class="py-3" style=${{ borderTop: `1px solid ${t.borderSoft}` }}>
      <div class="flex items-center justify-between mb-2">
        <span style=${{ color: t.text, fontFamily: tp.bodyFamily, fontWeight: 400, fontSize: 15 }}>${label}</span>
      </div>
      <div class="rounded-full p-1 flex items-center"
           style=${{ background: t.bgSoft, border: `1px solid ${t.borderSoft}` }}>
        ${options.map(opt => {
          const selected = opt.id === value
          return html`
            <button key=${opt.id} onClick=${() => onChange(opt.id)}
                    class="flex-1 px-3 py-2 rounded-full transition-colors"
                    style=${{
                      background: selected ? t.accent : 'transparent',
                      color:      selected ? t.onAccent : t.textSoft,
                      fontFamily: tp.bodyFamily,
                      fontWeight: selected ? 600 : 500,
                      fontSize: 13,
                    }}>${opt.label}</button>
          `
        })}
      </div>
    </div>
  `
}

function VisualPicker({ candidate, label, options, value, onChange }) {

  return html`

function PracticeSettingsSheet({ candidate, practice, onClose, desktop = false }) {

  return html`

         style=${{ background: t.modalBackdrop, zIndex: 20 }}
         onClick=${onClose}>
      <div class=${desktop ? 'candidate-fade' : 'settings-sheet candidate-fade'}
           style=${sheetStyle}
           onClick=${(e) => e.stopPropagation()}>
        ${!desktop && html`<div style=${{ width: 44, height: 4, borderRadius: 4, background: t.borderSoft, margin: '0 auto 16px' }}></div>`}
        <div class="flex items-center justify-between mb-1">
          <h3 style=${{
            fontFamily: tp.headingFamily,
            fontWeight: 600,
            fontSize: 22,
            letterSpacing: '-0.01em',
            color: t.text,
          }}>Practice</h3>
          <button onClick=${onClose} class="rounded-full px-3 py-1.5"
                  style=${{ background: 'transparent', border: `1px solid ${t.borderSoft}`, color: t.textSoft, fontFamily: tp.bodyFamily, fontSize: 12, fontWeight: 500 }}>Close</button>
        </div>
        <div style=${{ color: t.muted, fontFamily: tp.bodyFamily, fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 8 }}>${title}</div>

        ${!isNavi && html`

                      value=${bpm} onChange=${setBpm} step=${0.5} min=${3} max=${8} />
          <${SegmentedControl} candidate=${candidate} label="Inhale : Exhale"
                               value=${ratio} onChange=${setRatio}
                               options=${[
                                 { id: '1-1', label: '1 : 1' },
                                 { id: '4-6', label: '4 : 6' },
                                 { id: '4-7', label: '4 : 7' },
                                 { id: '1-2', label: '1 : 2' },
                               ]} />
          <${Stepper} candidate=${candidate} label="Duration" unit="min"
                      value=${duration} onChange=${setDuration} step=${1} min=${1} max=${30} />
        `}

        ${isNavi && html`
          <${Stepper} candidate=${candidate} label="Front OM count" unit=""
                      value=${front} onChange=${setFront} step=${10} min=${20} max=${300} />
          <${Stepper} candidate=${candidate} label="Rounds" unit=""
                      value=${rounds} onChange=${setRounds} step=${1} min=${1} max=${9} />
        `}

        <${VisualPicker} candidate=${candidate} label="Cue timbre"

                         options=${[
                           { id: 'bowl',  label: 'Bowl',  glyph: '◯' },

            <${ToggleSwitch} candidate=${candidate} value=${perOmTick} onChange=${setPerOmTick} ariaLabel="Per-OM tick" />
          </div>

        <${PrimaryButton} candidate=${candidate} label="Done" onClick=${onClose} />
      </div>
    </div>
  `

          <div class="flex items-center justify-between">
            <span style=${{ color: t.textSoft, fontFamily: tp.bodyFamily, fontSize: 13 }}>Version</span>
            <span style=${{ color: t.text, fontFamily: tp.bodyFamily, fontSize: 13, fontVariantNumeric: 'tabular-nums' }}>1.6.0</span>
          </div>
          <div class="flex items-center justify-between mt-2">
            <span style=${{ color: t.textSoft, fontFamily: tp.bodyFamily, fontSize: 13 }}>Source</span>
            <span style=${{ color: t.accentStrong, fontFamily: tp.bodyFamily, fontSize: 13, fontWeight: 600 }}>GitHub →</span>
          </div>
        </div>
      </div>
    </div>
  `
}

// ─────────────────────────────────────────────────────────────────────────────
//  Practice screens — Idle (A) · Running (B) · Complete (C)
// ─────────────────────────────────────────────────────────────────────────────

function PracticeChrome({
  candidate, practice, setPractice, switcherDisabled,
  orbProps, feedback, bottom, onInfo, onAppSettings, shapeVariant, desktop = false,
  topBanner = null, bottomBanner = null,
}) {
  const t = candidate.tokens
  const tp = TYPOGRAPHY
  const title = PRACTICES.find(p => p.id === practice).title
  // On desktop the orb is larger (`large` mode → 320 px) and the switcher + controls
  // are width-capped so the layout doesn't sprawl across the wider column.
  const innerOrbProps = { ...orbProps, large: desktop }
  const capStyle = desktop ? { maxWidth: 400, margin: '0 auto', width: '100%' } : {}
  return html`
    <div class="screen">
      <${PracticeTopBar} candidate=${candidate} title=${title}
                         onInfoTap=${onInfo} onSettingsTap=${onAppSettings} />
      ${topBanner}
      <div class=${`${desktop ? 'px-8' : 'px-5'} pb-4`}>
        <div style=${capStyle}>
          <${PracticeSwitcher} candidate=${candidate} active=${practice}
                               setActive=${setPractice} disabled=${switcherDisabled} />
        </div>
      </div>
      <!-- Orb + variable region — TOP-ALIGNED. No flex-1 here, so the orb sits at
           a fixed y-position. The feedback / setup card below the orb grows
           downward into the spacer; the orb itself never jiggles when the
           practice (HRV ↔ Stretch ↔ Navi) or phase (A / B / C) changes. -->
      <div class="flex flex-col items-center"
           style=${{ paddingTop: desktop ? 28 : 18, paddingLeft: desktop ? 32 : 20, paddingRight: desktop ? 32 : 20 }}>
        <${BreathingOrb} candidate=${candidate} shapeVariant=${shapeVariant} ...${innerOrbProps} />
        ${feedback}
      </div>
      <!-- Spacer absorbs the variable vertical room so the bottom group stays
           anchored regardless of how much space the variable region claims. -->
      <div class="flex-1"></div>
      ${bottomBanner}
      <!-- pt-4 gives a min 16 px gap between the variable region and Start, so the
           setup card can never glue to the button even when the spacer collapses
           on the highest-content case (Stretch idle, 6-cell setup card). -->
      <div class=${`${desktop ? 'px-8' : 'px-5'} pt-4 flex items-center gap-3`} style=${capStyle}>
        ${bottom}
      </div>
      <!-- Medical-advice disclaimer — mirrors src/app/App.tsx:1266 -->
      <div class=${`${desktop ? 'px-8' : 'px-5'} pt-3 pb-${desktop ? 6 : 5} text-center`}>
        <p style=${{
          fontFamily: tp.bodyFamily,
          fontSize: 11,
          fontWeight: 400,
          color: t.muted,
          letterSpacing: '0.02em',
          lineHeight: 1.4,
          whiteSpace: 'nowrap',
        }}>Guided breathing practice — not medical advice.</p>
      </div>
    </div>
  `
}

function IdleScreen({ candidate, practice, setPractice, ambientBreath, idleVariant, shapeVariant, desktop = false, installVariant = 'none', isIOS = false, onInfo, onAppSettings, onOpenPracticeSettings, onStart }) {
  const Variant = (IDLE_VARIANTS.find(v => v.id === idleVariant) || IDLE_VARIANTS[0]).render

  // Install banner — mobile + idle only (desktop = no banner). Each variant
  // chooses its own slot (top vs bottom of the chrome).
  const [installDismissed, setInstallDismissed] = useState(false)
  const variantSpec = INSTALL_VARIANTS.find(v => v.id === installVariant) || INSTALL_VARIANTS[0]
  const showBanner = !desktop && installVariant !== 'none' && !installDismissed && variantSpec.render
  const bannerEl = showBanner
    ? html`<${variantSpec.render}
              candidate=${candidate}
              isIOS=${isIOS}
              onDismiss=${() => setInstallDismissed(true)}
              onInstall=${() => {}} />`
    : null
  const topBanner    = showBanner && variantSpec.position === 'top'    ? bannerEl : null
  const bottomBanner = showBanner && variantSpec.position === 'bottom' ? bannerEl : null

  return PracticeChrome({
    candidate, practice, setPractice, switcherDisabled: false,
    orbProps: { animate: ambientBreath, label: null, showRings: false },
    shapeVariant, desktop,
    topBanner, bottomBanner,
    feedback: html`
      <div class="w-full" style=${desktop ? { marginTop: 36, maxWidth: 440, marginLeft: 'auto', marginRight: 'auto' } : { marginTop: 30 }}>
        <${Variant} candidate=${candidate} practice=${practice} onTap=${onOpenPracticeSettings} />
      </div>
    `,
    bottom: html`
      <${PrimaryButton} candidate=${candidate} label="Start" onClick=${onStart} flex=${true} />
      <${MuteButton} candidate=${candidate} />
    `,
    onInfo, onAppSettings,
  })
}

function RunningScreen({ candidate, practice, shapeVariant, desktop = false, onInfo, onAppSettings, onEnd }) {
  // Pull the breath label from the same shared clock the BreathingOrb uses so the label
  // flip and the visual transition happen at the same instant — no drift.
  const { phase } = useBreathPhase({ active: true })
  const breathLabel = phase === 'in' ? 'In' : 'Out'

  const feedback = practice === 'hrv'
    ? html`<${FeedbackHRV} candidate=${candidate} primary="02:51" secondary="5.5 BPM · 1:1" />`
    : practice === 'stretch'
      ? html`<${FeedbackCount} candidate=${candidate} big="2" mid="of 5" small="Hamstring fold · 0:45 left" />`
      : html`<${FeedbackCount} candidate=${candidate} big="47" mid="/ 100" small="Round 1 of 3 · Front" />`

  return PracticeChrome({
    candidate, practice, setPractice: () => {},
    switcherDisabled: true,
    orbProps: { animate: true, label: breathLabel },
    shapeVariant, desktop,
    feedback,
    bottom: html`
      <${PrimaryButton} candidate=${candidate} label="End session" onClick=${onEnd} flex=${true} />
      <${MuteButton} candidate=${candidate} />
    `,
    onInfo, onAppSettings,
  })
}

function CompleteScreen({ candidate, practice, setPractice, ambientBreath, shapeVariant, desktop = false, onInfo, onAppSettings, onDone }) {
  const t = candidate.tokens
  const tp = TYPOGRAPHY
  return PracticeChrome({
    candidate, practice, setPractice, switcherDisabled: false,
    orbProps: { animate: ambientBreath, label: null, marker: html`<${CheckMarker} /> `, showRings: false },
    shapeVariant, desktop,
    feedback: html`
      <div class="flex flex-col items-center" style=${{ marginTop: 28 }}>
        <div style=${{
          fontFamily: tp.headingFamily,
          fontWeight: 600,
          fontSize: 18,
          color: t.text,
          letterSpacing: '0.01em',
        }}>Session complete</div>
        <div style=${{
          marginTop: 6,
          fontFamily: tp.bodyFamily,
          fontWeight: 500,
          fontSize: 12,
          letterSpacing: '0.16em',
          color: t.muted,
          textTransform: 'uppercase',
        }}>Take a moment</div>
      </div>
    `,
    bottom: html`
      <${PrimaryButton} candidate=${candidate} label="Done" onClick=${onDone} flex=${true} />
      <${MuteButton} candidate=${candidate} />
    `,
    onInfo, onAppSettings,
  })
}

// ─────────────────────────────────────────────────────────────────────────────
//  PhoneScreen — routes between Learn / App Settings / A / B / C
// ─────────────────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────────
//  Desktop shell — same screens, wider canvas, 320 px orb, modal practice settings.
//  Validates the design at a desktop viewport without splitting into multi-column.
// ─────────────────────────────────────────────────────────────────────────────

function DesktopShell({ candidate, candidates, themeKey, onThemeChange, screen, setScreen, practice, setPractice, ambientBreath, idleVariant, shapeVariant }) {
  const t = candidate.tokens
  const [practiceSettingsOpen, setPracticeSettingsOpen] = useState(false)

  // Wider column for Learn / App Settings (scroll-content), narrower for practice screens.
  const wideColumn   = screen === 'learn' || screen === 'app-settings'
  const columnWidth  = wideColumn ? 640 : 520

  const bgStyle = {
    background: `radial-gradient(50% 70% at 50% 25%, ${t.bgEdge} 0%, ${t.bg} 50%, ${t.bgSoft} 100%)`,
    color: t.text,
  }

  let content = null
  if (screen === 'learn') {
    content = html`<${LearnPage} candidate=${candidate} desktop=${true} onBack=${() => setScreen('idle')} />`
  } else if (screen === 'app-settings') {
    content = html`<${AppSettingsPage} candidate=${candidate} candidates=${candidates}
                                       themeKey=${themeKey} onThemeChange=${onThemeChange}
                                       desktop=${true}
                                       onBack=${() => setScreen('idle')} />`
  } else if (screen === 'idle') {
    content = html`<${IdleScreen} candidate=${candidate} practice=${practice} setPractice=${setPractice}
                                  ambientBreath=${ambientBreath}
                                  idleVariant=${idleVariant}
                                  shapeVariant=${shapeVariant}
                                  desktop=${true}
                                  onInfo=${() => setScreen('learn')}
                                  onAppSettings=${() => setScreen('app-settings')}
                                  onOpenPracticeSettings=${() => setPracticeSettingsOpen(true)}
                                  onStart=${() => setScreen('running')} />`
  } else if (screen === 'running') {
    content = html`<${RunningScreen} candidate=${candidate} practice=${practice}
                                     shapeVariant=${shapeVariant}
                                     desktop=${true}
                                     onInfo=${() => setScreen('learn')}
                                     onAppSettings=${() => setScreen('app-settings')}
                                     onEnd=${() => setScreen('complete')} />`
  } else if (screen === 'complete') {
    content = html`<${CompleteScreen} candidate=${candidate} practice=${practice} setPractice=${setPractice}
                                      ambientBreath=${ambientBreath}
                                      shapeVariant=${shapeVariant}
                                      desktop=${true}
                                      onInfo=${() => setScreen('learn')}
                                      onAppSettings=${() => setScreen('app-settings')}
                                      onDone=${() => setScreen('idle')} />`
  }

  // Desktop "window" — 1024 × 800 with rounded corners + soft shadow, simulating a
  // PWA-on-desktop or browser-viewport view. 800 px height gives the worst-case
  // (Stretch idle, 320 px orb + 6-cell setup card + pt-4 min gap + Start + disclaimer)
  // room to fit without scrolling and without clipping the disclaimer.
  return html`
    <div class="candidate-fade" style=${{
      width: 1024, height: 800,
      borderRadius: 20,
      overflow: 'hidden',
      position: 'relative',
      ...bgStyle,
      boxShadow: '0 30px 80px rgba(0,0,0,0.5)',
      border: `1px solid ${t.borderSoft}`,
    }}>
      <div style=${{
        position: 'absolute', inset: 0,
        display: 'flex', justifyContent: 'center',
      }}>
        <div style=${{
          width: '100%', maxWidth: columnWidth, height: '100%',
          position: 'relative',
        }}>
          ${content}
        </div>
      </div>
      ${practiceSettingsOpen && html`
        <${PracticeSettingsSheet} candidate=${candidate} practice=${practice}
                                  desktop=${true}
                                  onClose=${() => setPracticeSettingsOpen(false)} />
      `}
    </div>
  `
}

function PhoneScreen({ candidate, candidates, themeKey, onThemeChange, screen, setScreen, practice, setPractice, ambientBreath, idleVariant, shapeVariant, installVariant, isIOS }) {
  const t = candidate.tokens
  const [practiceSettingsOpen, setPracticeSettingsOpen] = useState(false)

  const bgStyle = {
    background: `radial-gradient(120% 100% at 50% 0%, ${t.bgEdge} 0%, ${t.bg} 45%, ${t.bgSoft} 100%)`,
    color: t.text,
  }

  let content = null
  if (screen === 'learn') {
    content = html`<${LearnPage} candidate=${candidate} onBack=${() => setScreen('idle')} />`
  } else if (screen === 'app-settings') {
    content = html`<${AppSettingsPage} candidate=${candidate} candidates=${candidates}
                                       themeKey=${themeKey} onThemeChange=${onThemeChange}
                                       onBack=${() => setScreen('idle')} />`
  } else if (screen === 'idle') {
    content = html`<${IdleScreen} candidate=${candidate} practice=${practice} setPractice=${setPractice}
                                  ambientBreath=${ambientBreath}
                                  idleVariant=${idleVariant}
                                  shapeVariant=${shapeVariant}
                                  installVariant=${installVariant}
                                  isIOS=${isIOS}
                                  onInfo=${() => setScreen('learn')}
                                  onAppSettings=${() => setScreen('app-settings')}
                                  onOpenPracticeSettings=${() => setPracticeSettingsOpen(true)}
                                  onStart=${() => setScreen('running')} />`
  } else if (screen === 'running') {
    content = html`<${RunningScreen} candidate=${candidate} practice=${practice}
                                     shapeVariant=${shapeVariant}
                                     onInfo=${() => setScreen('learn')}
                                     onAppSettings=${() => setScreen('app-settings')}
                                     onEnd=${() => setScreen('complete')} />`
  } else if (screen === 'complete') {
    content = html`<${CompleteScreen} candidate=${candidate} practice=${practice} setPractice=${setPractice}
                                      ambientBreath=${ambientBreath}
                                      shapeVariant=${shapeVariant}
                                      onInfo=${() => setScreen('learn')}
                                      onAppSettings=${() => setScreen('app-settings')}
                                      onDone=${() => setScreen('idle')} />`
  }

  return html`
    <div class="phone-frame candidate-fade" style=${bgStyle}>
      <div class="phone-notch"></div>
      ${content}
      ${practiceSettingsOpen && html`
        <${PracticeSettingsSheet} candidate=${candidate} practice=${practice}
                                  onClose=${() => setPracticeSettingsOpen(false)} />
      `}
    </div>
  `
}

// ─────────────────────────────────────────────────────────────────────────────
//  Harness — state, practice, theme, ambient-breath toggle
// ─────────────────────────────────────────────────────────────────────────────

const SCREENS = [
  { id: 'learn',         label: '01 · Learn' },
  { id: 'app-settings',  label: '02 · App Settings' },
  { id: 'idle',          label: 'A · Idle' },
  { id: 'running',       label: 'B · Running' },
  { id: 'complete',      label: 'C · Complete' },
]

function App() {
  const [themeKey, setThemeKey]       = useState('mono-zen-light')
  const [screen, setScreen]           = useState('running')
  const [practice, setPractice]       = useState('hrv')
  const [ambientBreath, setAmbient]   = useState(false)
  const [idleVariant, setIdleVariant] = useState('grid')
  const [shapeVariant, setShapeVariant] = useState('orb-halo')
  const [viewport, setViewport]       = useState('mobile')
  const [installVariant, setInstallVariant] = useState('none')
  const [isIOS, setIsIOS]             = useState(false)
  const [shortlist, setShortlist]     = useState(new Set())

  const active = CANDIDATES.find(c => c.key === themeKey)

  useEffect(() => {
    const onKey = (e) => {
      // Number keys 1–5 → screens
      const sIdx = '12345'.indexOf(e.key)
      if (sIdx >= 0) setScreen(SCREENS[sIdx].id)
      // Letter keys H/S/N → practice
      if (e.key === 'h' || e.key === 'H') setPractice('hrv')
      if (e.key === 's' || e.key === 'S') setPractice('stretch')
      if (e.key === 'n' || e.key === 'N') setPractice('navi')
      // T → toggle theme
      if (e.key === 't' || e.key === 'T') {
        setThemeKey(k => k === 'mono-zen-light' ? 'mono-zen-dark' : 'mono-zen-light')
      }
      // B → ambient breath toggle
      if (e.key === 'b' || e.key === 'B') setAmbient(a => !a)
      // V1–V5 idle variants via Q/W/E/R/Y (top row, skip T = theme)
      if (e.key === 'q' || e.key === 'Q') setIdleVariant('grid')
      if (e.key === 'w' || e.key === 'W') setIdleVariant('list')
      if (e.key === 'e' || e.key === 'E') setIdleVariant('primary')
      if (e.key === 'r' || e.key === 'R') setIdleVariant('pills')
      if (e.key === 'y' || e.key === 'Y') setIdleVariant('narrative')
      // Shape variants via Z/X/C/V/F/M (skip B = ambient, N = practice, T = theme)
      if (e.key === 'z' || e.key === 'Z') setShapeVariant('orb-halo')
      if (e.key === 'x' || e.key === 'X') setShapeVariant('orb-halo-refined')
      if (e.key === 'c' || e.key === 'C') setShapeVariant('minimal-rings')
      if (e.key === 'v' || e.key === 'V') setShapeVariant('lungs')
      if (e.key === 'f' || e.key === 'F') setShapeVariant('column')
      if (e.key === 'm' || e.key === 'M') setShapeVariant('ripple')
    }
    window.addEventListener('keydown', onKey)
    return () => window.removeEventListener('keydown', onKey)
  }, [])

  const toggleShortlist = (key) => {
    setShortlist(prev => {
      const next = new Set(prev)
      if (next.has(key)) next.delete(key); else next.add(key)
      return next
    })
  }

  const showPracticeRow = screen === 'idle' || screen === 'running' || screen === 'complete'
  const showAmbientRow  = screen === 'idle' || screen === 'complete'
  const showVariantRow  = screen === 'idle'
  const showShapeRow    = screen === 'idle' || screen === 'running' || screen === 'complete'
  const showInstallRow  = viewport === 'mobile' && screen === 'idle'
  const activeVariant   = IDLE_VARIANTS.find(v => v.id === idleVariant) || IDLE_VARIANTS[0]
  const activeShape     = SHAPE_VARIANTS.find(v => v.id === shapeVariant) || SHAPE_VARIANTS[0]
  const activeInstall   = INSTALL_VARIANTS.find(v => v.id === installVariant) || INSTALL_VARIANTS[0]

  return html`
    <div class="min-h-screen flex flex-col">
      <div class="harness-bar px-6 py-4">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div class="flex items-center gap-3">
            <span class="text-xs uppercase tracking-widest text-sky-300">Harness · not part of product</span>
            <span class="text-slate-500 text-xs">Spike 010 · 5 states · 1–5 screens, H/S/N practice, T theme, B ambient</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-slate-400 mr-1">viewport</span>
            <button onClick=${() => setViewport('mobile')}
                    class=${`px-3 py-1.5 rounded-md text-sm ${viewport === 'mobile' ? 'bg-cyan-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>Mobile</button>
            <button onClick=${() => setViewport('desktop')}
                    class=${`px-3 py-1.5 rounded-md text-sm ${viewport === 'desktop' ? 'bg-cyan-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>Desktop</button>
            <span class="text-xs text-slate-400 mx-2">·</span>
            <span class="text-xs text-slate-400 mr-1">theme</span>
            ${CANDIDATES.map(c => html`
              <button key=${c.key} onClick=${() => setThemeKey(c.key)}
                      class=${`letter-btn px-3 py-1.5 rounded-md text-sm ${themeKey === c.key ? 'active' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}
                      title=${c.name}>${c.letter}</button>
            `)}
          </div>
        </div>

        <!-- Row 2: screen selector -->
        <div class="mt-3 flex items-center gap-2 flex-wrap">
          <span class="text-xs text-slate-400 mr-1">screen</span>
          ${SCREENS.map(s => html`
            <button key=${s.id} onClick=${() => setScreen(s.id)}
                    class=${`px-3 py-1.5 rounded-md text-sm ${screen === s.id ? 'bg-emerald-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
              ${s.label}
            </button>
          `)}
        </div>

        <!-- Row 3: practice + ambient (contextual) -->
        ${(showPracticeRow || showAmbientRow) && html`
          <div class="mt-3 flex items-center gap-3 flex-wrap">
            ${showPracticeRow && html`
              <div class="flex items-center gap-2">
                <span class="text-xs text-slate-400 mr-1">practice</span>
                ${PRACTICES.map(p => html`
                  <button key=${p.id} onClick=${() => setPractice(p.id)}
                          class=${`px-3 py-1.5 rounded-md text-sm ${practice === p.id ? 'bg-sky-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                    ${p.label}
                  </button>
                `)}
              </div>
            `}
            ${showAmbientRow && html`
              <div class="flex items-center gap-2 ml-2">
                <span class="text-xs text-slate-400 mr-1">orb</span>
                <button onClick=${() => setAmbient(false)}
                        class=${`px-3 py-1.5 rounded-md text-sm ${!ambientBreath ? 'bg-amber-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                  still
                </button>
                <button onClick=${() => setAmbient(true)}
                        class=${`px-3 py-1.5 rounded-md text-sm ${ambientBreath ? 'bg-amber-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                  ambient breath
                </button>
              </div>
            `}
          </div>
        `}

        <!-- Row 4: Idle variant (only when screen === idle) -->
        ${showVariantRow && html`
          <div class="mt-3 flex items-center gap-2 flex-wrap">
            <span class="text-xs text-slate-400 mr-1">idle variant</span>
            ${IDLE_VARIANTS.map(v => html`
              <button key=${v.id} onClick=${() => setIdleVariant(v.id)}
                      title=${v.hint}
                      class=${`px-3 py-1.5 rounded-md text-sm ${idleVariant === v.id ? 'bg-fuchsia-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                ${v.label}
              </button>
            `)}
            <span class="text-xs text-slate-500 ml-2 italic">${activeVariant.hint}</span>
          </div>
        `}

        <!-- Row 5: Shape variant (the final exploration) -->
        ${showShapeRow && html`
          <div class="mt-3 flex items-center gap-2 flex-wrap">
            <span class="text-xs text-slate-400 mr-1">shape</span>
            ${SHAPE_VARIANTS.map(v => html`
              <button key=${v.id} onClick=${() => setShapeVariant(v.id)}
                      title=${v.hint}
                      class=${`px-3 py-1.5 rounded-md text-sm ${shapeVariant === v.id ? 'bg-rose-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                ${v.label}
              </button>
            `)}
            <span class="text-xs text-slate-500 ml-2 italic">${activeShape.hint}</span>
          </div>
        `}

        <!-- Row 6: Install banner (Mobile + Idle only) -->
        ${showInstallRow && html`
          <div class="mt-3 flex items-center gap-2 flex-wrap">
            <span class="text-xs text-slate-400 mr-1">install</span>
            ${INSTALL_VARIANTS.map(v => html`
              <button key=${v.id} onClick=${() => setInstallVariant(v.id)}
                      title=${v.hint}
                      class=${`px-3 py-1.5 rounded-md text-sm ${installVariant === v.id ? 'bg-lime-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                ${v.label}
              </button>
            `)}
            <span class="text-xs text-slate-400 mx-2">·</span>
            <button onClick=${() => setIsIOS(b => !b)}
                    class=${`px-3 py-1.5 rounded-md text-sm ${isIOS ? 'bg-orange-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
              ${isIOS ? 'iOS' : 'Android'}
            </button>
            <span class="text-xs text-slate-500 ml-2 italic">${activeInstall.hint}</span>
          </div>
        `}

        <!-- Row 4: shortlist (per theme) -->
        <div class="mt-3 flex items-center justify-between flex-wrap gap-3">
          <div class="text-xs text-slate-400 max-w-2xl">
            ${SCREENS.find(s => s.id === screen).label}
            ${showPracticeRow ? ` · ${PRACTICES.find(p => p.id === practice).title}` : ''}
            ${showAmbientRow ? ` · orb ${ambientBreath ? 'ambient breath' : 'still'}` : ''}
          </div>
          <div class="flex items-center gap-3">
            <button onClick=${() => toggleShortlist(active.key)}
                    class=${`px-3 py-1.5 rounded-md text-sm ${shortlist.has(active.key) ? 'bg-emerald-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
              ${shortlist.has(active.key) ? '✓ shortlisted' : '+ shortlist'}
            </button>
            <div class="text-xs text-slate-400">
              Shortlist:
              ${shortlist.size === 0 && html`<span class="ml-1 text-slate-500">none</span>`}
              ${[...shortlist].map(k => {
                const c = CANDIDATES.find(x => x.key === k)
                return html`<span key=${k} class="chip ml-1" title=${c.name}>${c.letter}</span>`
              })}
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 flex items-start justify-center gap-10 p-10 flex-wrap">
        ${viewport === 'mobile' ? html`
          <${PhoneScreen}
            key=${`mobile-${active.key}-${screen}-${practice}-${ambientBreath}-${idleVariant}-${shapeVariant}-${installVariant}-${isIOS}`}
            candidate=${active}
            candidates=${CANDIDATES}
            themeKey=${themeKey}
            onThemeChange=${setThemeKey}
            screen=${screen}
            setScreen=${setScreen}
            practice=${practice}
            setPractice=${setPractice}
            ambientBreath=${ambientBreath}
            idleVariant=${idleVariant}
            shapeVariant=${shapeVariant}
            installVariant=${installVariant}
            isIOS=${isIOS}
          />
        ` : html`
          <${DesktopShell}
            key=${`desktop-${active.key}-${screen}-${practice}-${ambientBreath}-${idleVariant}-${shapeVariant}`}
            candidate=${active}
            candidates=${CANDIDATES}
            themeKey=${themeKey}
            onThemeChange=${setThemeKey}
            screen=${screen}
            setScreen=${setScreen}
            practice=${practice}
            setPractice=${setPractice}
            ambientBreath=${ambientBreath}
            idleVariant=${idleVariant}
            shapeVariant=${shapeVariant}
          />
        `}
        <!-- Token + state notes -->
        <div class="text-slate-200 max-w-md text-xs leading-relaxed">
          <h2 class="text-base font-semibold mb-2 text-slate-100">
            ${active.letter}. ${active.name}
          </h2>
          <div class="text-slate-400 mb-3">${active.mood}</div>
          <hr class="my-3 border-slate-700" />
          <div class="text-slate-300 font-semibold mb-2">Screens in this spike</div>
          <ul class="space-y-1 text-slate-300">
            <li>· <span class="font-mono">01 Learn</span> — info-icon destination; about Forrest, per-practice intros, resources</li>
            <li>· <span class="font-mono">02 App Settings</span> — gear-icon destination; theme, language, cue style, haptics, about</li>
            <li>· <span class="font-mono">A Idle</span> — current-setup card (tap for Practice Settings), Start + Mute</li>
            <li>· <span class="font-mono">B Running</span> — orb breathing with In/Out; switcher disabled; feedback varies by practice</li>
            <li>· <span class="font-mono">C Complete</span> — orb still, check marker, "Session complete" line, Done</li>
          </ul>
          <hr class="my-3 border-slate-700" />
          <div class="text-slate-300 font-semibold mb-2">Feedback variants in B</div>
          <ul class="space-y-1 text-slate-300">
            <li>· <span class="font-mono">HRV</span> — time-based: <span class="font-mono">02:51</span> + <span class="font-mono">5.5 BPM · 1:1</span></li>
            <li>· <span class="font-mono">Stretch</span> — count-based: <span class="font-mono">2 of 5</span> + pose + per-stretch time</li>
            <li>· <span class="font-mono">Navi</span> — count-based: <span class="font-mono">47 / 100</span> + round · front/back</li>
          </ul>
          <hr class="my-3 border-slate-700" />
          <div class="text-slate-300 font-semibold mb-2">Orb behaviour</div>
          <ul class="space-y-1 text-slate-300">
            <li>· Default <span class="font-mono">still</span> on A and C — no animation, no label</li>
            <li>· Toggle <span class="font-mono">ambient breath</span> to audition gentle scale without the In/Out label flip</li>
            <li>· On B: always animating, In/Out flipping inside the centre disc</li>
            <li>· On C: <span class="font-mono">✓</span> check marker inside the centre disc</li>
            <li class="text-slate-400 italic mt-1">Both still + ambient locked; ship as <span class="font-mono">VITE_ORB_IDLE_BEHAVIOR</span> dev toggle (cf. spike-007 switcher pattern)</li>
          </ul>
          ${showVariantRow && html`
            <hr class="my-3 border-slate-700" />
            <div class="text-slate-300 font-semibold mb-2">Idle variants</div>
            <ul class="space-y-1 text-slate-300">
              ${IDLE_VARIANTS.map(v => html`
                <li key=${v.id}>
                  · <span class=${`font-mono ${idleVariant === v.id ? 'text-fuchsia-300' : ''}`}>${v.label}</span>
                  — <span class="text-slate-400">${v.hint}</span>
                </li>
              `)}
              <li class="text-slate-400 italic mt-1">V1 (Grid) locked — others available for revisit.</li>
            </ul>
          `}
          ${showInstallRow && html`
            <hr class="my-3 border-slate-700" />
            <div class="text-slate-300 font-semibold mb-2">Install banner (mobile + idle only)</div>
            <div class="text-slate-400 mb-2 italic text-[11px] leading-relaxed">
              Today's <span class="font-mono">src/components/InstallBanner.tsx</span> is a
              slim top strip; operator flagged it as ugly. Four mono-zen alternatives
              below. Toggle <span class="font-mono">iOS</span> to flip the action between
              "Install" and "How to install" (the real component branches on
              <span class="font-mono">isIOS</span> already).
            </div>
            <ul class="space-y-1 text-slate-300">
              ${INSTALL_VARIANTS.map(v => html`
                <li key=${v.id}>
                  · <span class=${`font-mono ${installVariant === v.id ? 'text-lime-300' : ''}`}>${v.label}</span>
                  — <span class="text-slate-400">${v.hint}</span>
                </li>
              `)}
              <li class="text-slate-400 italic mt-1">Dismiss closes the banner; flip the variant in the harness to bring it back.</li>
            </ul>
          `}
          ${showShapeRow && html`
            <hr class="my-3 border-slate-700" />
            <div class="text-slate-300 font-semibold mb-2">Shape variants (this iteration's focus)</div>
            <div class="text-slate-400 mb-2 italic text-[11px] leading-relaxed">
              All five preserve the end-of-phase ring cue: an <span class="text-slate-200">outer boundary</span>
              always visible (inhale target), an <span class="text-slate-200">inner boundary</span> visible only during
              exhale (rest target). The user paces by watching distance + velocity to the next ring.
            </div>
            <ul class="space-y-1 text-slate-300">
              ${SHAPE_VARIANTS.map(v => html`
                <li key=${v.id}>
                  · <span class=${`font-mono ${shapeVariant === v.id ? 'text-rose-300' : ''}`}>${v.label}</span>
                  — <span class="text-slate-400">${v.hint}</span>
                </li>
              `)}
              <li class="text-slate-400 italic mt-1">All five share the same breath clock (5.5 s phase, ease-in-out-sine) — flip mid-breath and the cycle stays in sync.</li>
            </ul>
          `}
        </div>
      </div>
    </div>
  `
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`)
</script>
</body>
</html>
