<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spike 008 — Chime Replacement Timbre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>
    <style>
      /* Calm, app-adjacent palette so timbres are auditioned in a representative mood. */
      body { background: #2b303b; color: #e6eef3; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Stack per .planning/spikes/CONVENTIONS.md — React 19 + htm + Tailwind, all CDN, no build.
      import React from 'https://esm.sh/react@19.0.0'
      import { createRoot } from 'https://esm.sh/react-dom@19.0.0/client'
      import htm from 'https://esm.sh/htm@3.1.1'
      const html = htm.bind(React.createElement)
      const { useState, useRef, useCallback } = React

      // ───────────────────────────────────────────────────────────────────
      // Timbre model — mirrors src/audio/timbres.ts TimbrePreset.
      // Extension for this spike: optional `attackSec` (0 = strike envelope,
      // the only mode cueSynth supports today; >0 = soft breath attack, which
      // the real build would need to add as an envelope mode).
      // All oscillators are 'sine' — the app's D-14 constraint (no PeriodicWave).
      // ───────────────────────────────────────────────────────────────────

      // KEPT — verbatim from src/audio/timbres.ts (reference, not under test).
      const KEPT = {
        bowl: {
          label: 'Bowl', note: 'KEPT — warm singing bowl, inharmonic (2.76 / 5.4)',
          partials: [[1.0, 1.0], [2.76, 0.4], [5.4, 0.15]],
          decayTauIn: 1.4, decayTauOut: 1.8, filterFreqHz: 3000, filterQ: 0.5,
          peakGain: 0.18, attackSec: 0,
        },
        bell: {
          label: 'Bell', note: 'KEPT — soft hand-bell, inharmonic (2.5 / 4.0), brighter',
          partials: [[1.0, 1.0], [2.5, 0.5], [4.0, 0.15]],
          decayTauIn: 0.8, decayTauOut: 1.1, filterFreqHz: 5000, filterQ: 0.8,
          peakGain: 0.18, attackSec: 0,
        },
        sine: {
          label: 'Sine', note: 'KEPT — pure single sine, soft and long',
          partials: [[1.0, 1.0]],
          decayTauIn: 1.5, decayTauOut: 2.0, filterFreqHz: 8000, filterQ: 0.3,
          peakGain: 0.18, attackSec: 0,
        },
      }

      // CURRENT — the chime being replaced. Bowl's stack + one shimmer partial:
      // this near-clone of Bowl is exactly the "too close" problem.
      const CURRENT = {
        chime: {
          label: 'Chime', note: 'CURRENT — being replaced. Bowl stack + 7.6 shimmer → too close to Bowl.',
          partials: [[1.0, 1.0], [2.76, 0.4], [5.4, 0.15], [7.6, 0.08]],
          decayTauIn: 1.0, decayTauOut: 1.4, filterFreqHz: 7000, filterQ: 1.0,
          peakGain: 0.16, attackSec: 0,
        },
      }

      // CANDIDATES — flute family is harmonic (integer ratios), unlike the
      // inharmonic bowl/bell. Reed is the non-flute fallback.
      const CANDIDATES = {
        flutePure: {
          label: 'Flute — pure', note: 'Harmonic 1·2·3, fundamental-dominant. Strike envelope (no cueSynth change).',
          partials: [[1.0, 1.0], [2.0, 0.22], [3.0, 0.08]],
          decayTauIn: 1.0, decayTauOut: 1.3, filterFreqHz: 4000, filterQ: 0.4,
          peakGain: 0.18, attackSec: 0,
        },
        fluteBreathy: {
          label: 'Flute — breathy', note: 'Harmonic 1·2·3·4, brighter filter — more air/presence. Strike envelope.',
          partials: [[1.0, 1.0], [2.0, 0.28], [3.0, 0.14], [4.0, 0.06]],
          decayTauIn: 1.0, decayTauOut: 1.3, filterFreqHz: 5500, filterQ: 0.5,
          peakGain: 0.17, attackSec: 0,
        },
        fluteSoft: {
          label: 'Flute — soft attack', note: 'Pure flute partials + ~0.13s breath attack. Needs a cueSynth envelope-mode extension.',
          partials: [[1.0, 1.0], [2.0, 0.22], [3.0, 0.08]],
          decayTauIn: 1.1, decayTauOut: 1.4, filterFreqHz: 4000, filterQ: 0.4,
          peakGain: 0.18, attackSec: 0.13,
        },
        reed: {
          label: 'Reed (fallback)', note: 'Non-flute fallback — rich harmonic 1–5, gentle attack. Harmonium-ish.',
          partials: [[1.0, 1.0], [2.0, 0.5], [3.0, 0.33], [4.0, 0.18], [5.0, 0.1]],
          decayTauIn: 0.9, decayTauOut: 1.2, filterFreqHz: 4500, filterQ: 0.6,
          peakGain: 0.15, attackSec: 0.06,
        },
      }

      const FUND_IN = 440  // A4 — verbatim app fundamentalHzIn
      const FUND_OUT = 220 // A3 — verbatim app fundamentalHzOut

      // ───────────────────────────────────────────────────────────────────
      // Web Audio — one AudioContext, created lazily on first user gesture
      // (browser autoplay policy — CONVENTIONS.md).
      // ───────────────────────────────────────────────────────────────────
      let audioCtx = null
      function getCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        if (audioCtx.state === 'suspended') audioCtx.resume()
        return audioCtx
      }

      // Render one cue. Mirrors the app's additive-sine path: per-partial sine
      // oscillator → per-partial gain → summed into a lowpass filter → envelope
      // gain → destination.
      function playCue(preset, phase) {
        const ctx = getCtx()
        const t0 = ctx.currentTime + 0.03
        const fundamental = phase === 'in' ? FUND_IN : FUND_OUT
        const decayTau = phase === 'in' ? preset.decayTauIn : preset.decayTauOut
        const attack = preset.attackSec || 0

        const filter = ctx.createBiquadFilter()
        filter.type = 'lowpass'
        filter.frequency.value = preset.filterFreqHz
        filter.Q.value = preset.filterQ

        const env = ctx.createGain()
        filter.connect(env)
        env.connect(ctx.destination)

        // Envelope: strike (instant peak) or soft attack (linear ramp up), then
        // exponential decay via setTargetAtTime with the preset time constant.
        env.gain.setValueAtTime(0.0001, t0)
        if (attack > 0) {
          env.gain.linearRampToValueAtTime(preset.peakGain, t0 + attack)
          env.gain.setTargetAtTime(0.0001, t0 + attack, decayTau)
        } else {
          env.gain.setValueAtTime(preset.peakGain, t0)
          env.gain.setTargetAtTime(0.0001, t0, decayTau)
        }

        const stopAt = t0 + attack + decayTau * 6
        for (const [ratio, gain] of preset.partials) {
          const osc = ctx.createOscillator()
          osc.type = 'sine'
          osc.frequency.value = fundamental * ratio
          const pg = ctx.createGain()
          pg.gain.value = gain
          osc.connect(pg)
          pg.connect(filter)
          osc.start(t0)
          osc.stop(stopAt)
        }
      }

      // ───────────────────────────────────────────────────────────────────
      // UI
      // ───────────────────────────────────────────────────────────────────
      function CueButton({ label, onClick }) {
        return html`<button
          onClick=${onClick}
          className="min-h-[44px] rounded-full border border-[#7da7b8] px-4 py-1.5 text-sm font-semibold
                     text-[#cfe2ea] hover:bg-[#3b4252] active:bg-[#434a59] transition">
          ${label}
        </button>`
      }

      function TimbreRow({ id, preset, onPlay }) {
        return html`<div className="flex flex-col gap-1 rounded-2xl border border-[#3b4252] bg-[#323847] p-4">
          <div className="flex items-center justify-between gap-3">
            <span className="text-base font-semibold">${preset.label}</span>
            <div className="flex gap-2">
              <${CueButton} label="In ▶" onClick=${() => onPlay(preset, 'in')} />
              <${CueButton} label="Out ▶" onClick=${() => onPlay(preset, 'out')} />
            </div>
          </div>
          <p className="text-xs text-[#9fb3bd]">${preset.note}</p>
        </div>`
      }

      function Section({ title, subtitle, entries, onPlay }) {
        return html`<section className="grid gap-2">
          <div>
            <h2 className="text-lg font-semibold text-[#cfe2ea]">${title}</h2>
            <p className="text-xs text-[#9fb3bd]">${subtitle}</p>
          </div>
          ${entries.map(([id, preset]) =>
            html`<${TimbreRow} key=${id} id=${id} preset=${preset} onPlay=${onPlay} />`)}
        </section>`
      }

      function App() {
        const [log, setLog] = useState([])
        const seqRef = useRef(null)

        const append = useCallback((line) => {
          const stamp = new Date().toISOString().slice(11, 23)
          setLog((prev) => [`${stamp}  ${line}`, ...prev].slice(0, 40))
        }, [])

        const onPlay = useCallback((preset, phase) => {
          playCue(preset, phase)
          append(`${preset.label}  ·  ${phase.toUpperCase()} cue`)
        }, [append])

        // A/B: play two timbres' In cues 1.4s apart for a direct distinctness test.
        const playAB = useCallback((aPreset, bPreset) => {
          playCue(aPreset, 'in')
          append(`A/B  ·  ${aPreset.label} → ${bPreset.label}`)
          if (seqRef.current) clearTimeout(seqRef.current)
          seqRef.current = setTimeout(() => playCue(bPreset, 'in'), 1400)
        }, [append])

        return html`<div className="mx-auto max-w-xl px-4 py-6 grid gap-5">
          <header className="grid gap-1">
            <div className="inline-flex w-fit rounded bg-[#1c2029] px-2 py-0.5 text-[10px] font-bold tracking-widest text-[#7da7b8]">
              SPIKE HARNESS — NOT THE PRODUCT
            </div>
            <h1 className="text-2xl font-semibold">008 · Chime Replacement Timbre</h1>
            <p className="text-sm text-[#9fb3bd]">
              Keep Bowl. Replace Chime. Audition each cue at A4 (In) / A3 (Out). The goal: a
              replacement clearly distinct from Bowl, Bell, and Sine — and still calm.
            </p>
          </header>

          <${Section}
            title="Kept timbres (reference)"
            subtitle="Verbatim from src/audio/timbres.ts — not under test."
            entries=${Object.entries(KEPT)} onPlay=${onPlay} />

          <${Section}
            title="Current chime (being replaced)"
            subtitle="Bowl's partial stack + one shimmer partial — the 'too close to Bowl' problem."
            entries=${Object.entries(CURRENT)} onPlay=${onPlay} />

          <${Section}
            title="Candidate replacements"
            subtitle="Flute family = harmonic partials (integer ratios), unlike the inharmonic Bowl/Bell."
            entries=${Object.entries(CANDIDATES)} onPlay=${onPlay} />

          <section className="grid gap-2">
            <h2 className="text-lg font-semibold text-[#cfe2ea]">A/B compare (In cues, 1.4s apart)</h2>
            <p className="text-xs text-[#9fb3bd]">The distinctness test — hear a kept timbre, then a candidate, back to back.</p>
            <div className="flex flex-wrap gap-2">
              <${CueButton} label="Bowl → Flute pure" onClick=${() => playAB(KEPT.bowl, CANDIDATES.flutePure)} />
              <${CueButton} label="Bowl → Flute soft" onClick=${() => playAB(KEPT.bowl, CANDIDATES.fluteSoft)} />
              <${CueButton} label="Sine → Flute pure" onClick=${() => playAB(KEPT.sine, CANDIDATES.flutePure)} />
              <${CueButton} label="Chime → Flute breathy" onClick=${() => playAB(CURRENT.chime, CANDIDATES.fluteBreathy)} />
            </div>
          </section>

          <section className="grid gap-2">
            <h2 className="text-lg font-semibold text-[#cfe2ea]">Event log</h2>
            <div className="h-40 overflow-y-auto rounded-2xl border border-[#3b4252] bg-[#1c2029] p-3 font-mono text-xs text-[#9fb3bd]">
              ${log.length === 0
                ? html`<span className="text-[#5b6470]">Play a cue — events appear here.</span>`
                : log.map((line, i) => html`<div key=${i}>${line}</div>`)}
            </div>
          </section>
        </div>`
      }

      createRoot(document.getElementById('root')).render(html`<${App} />`)
    </script>
  </body>
</html>
