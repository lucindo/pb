<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spike 009 — Look &amp; Feel Alternatives</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&family=Inter:wght@200;300;400;500;600;700&family=Playfair+Display:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet" />
<script>
  tailwind.config = { darkMode: 'class' }
</script>
<style>
  body { margin: 0; padding: 0; background: #0f172a; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
  .harness-bar { background: #0b1220; color: #cbd5e1; border-bottom: 1px solid #1e293b; }
  .letter-btn { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.04em; }
  .letter-btn.active { background: #38bdf8; color: #0b1220; }
  .phone-frame {
    width: 390px;
    height: 780px;
    border-radius: 56px;
    border: 14px solid #1f2937;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    transition: background 0.3s ease;
  }
  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 24px;
    background: #0b0f17;
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    z-index: 10;
  }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; }
  /* Paper grain — warm tone, for Soft Morning */
  .grain-paper {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.32  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-blend-mode: multiply;
  }
  /* Sand grain — coarser, warmer, for Sand & Stone */
  .grain-sand {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.62  0 0 0 0 0.42  0 0 0 0 0.28  0 0 0 0.10 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-blend-mode: multiply;
  }
  /* Aurora — slow drifting radial gradients, for Deep Night */
  .aurora-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(60% 40% at 20% 25%, rgba(167,139,250,0.22), transparent 70%),
      radial-gradient(50% 35% at 80% 75%, rgba(56,189,248,0.14), transparent 70%),
      radial-gradient(45% 30% at 60% 15%, rgba(236,72,153,0.10), transparent 70%);
    animation: aurora-drift 24s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes aurora-drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-6%, 4%) scale(1.08); }
  }
  /* Coastal Mist soft sky */
  .mist-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(70% 50% at 30% 20%, rgba(173,216,230,0.55), transparent 70%),
      radial-gradient(60% 45% at 80% 80%, rgba(124,177,207,0.30), transparent 70%);
    pointer-events: none;
  }
  /* Glass surface — frosted */
  .glass {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  /* Orb breathing animation — 11s cycle (5.5 in / 5.5 out, ~5.5 BPM resonant) */
  @keyframes breathe-scale {
    0%   { transform: scale(0.62); }
    50%  { transform: scale(1.00); }
    100% { transform: scale(0.62); }
  }
  .orb-breathe { animation: breathe-scale 11s ease-in-out infinite; transform-origin: center; }
  /* Glow halo for Deep Night orb */
  .orb-glow-violet {
    box-shadow:
      0 0 80px 24px rgba(167, 139, 250, 0.28),
      0 0 40px 8px rgba(196, 181, 253, 0.18) inset;
  }
  /* Glow halo for Coastal Mist orb */
  .orb-glow-mist {
    box-shadow:
      0 0 60px 18px rgba(124, 177, 207, 0.30),
      0 0 24px 6px rgba(255, 255, 255, 0.30) inset;
  }
  /* Headings per family */
  .font-cormorant { font-family: 'Cormorant Garamond', serif; }
  .font-source-serif { font-family: 'Source Serif 4', 'Source Serif Pro', serif; }
  .font-playfair { font-family: 'Playfair Display', serif; }
  .font-dm-sans { font-family: 'DM Sans', 'Inter', sans-serif; }
  .font-inter { font-family: 'Inter', sans-serif; }

  /* Tighten letter-spacing on ultralight headings */
  .heading-loose { letter-spacing: -0.01em; }
  .heading-tight { letter-spacing: -0.02em; }
  .heading-display { letter-spacing: 0; }

  /* Shortlist chip */
  .chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 999px;
    font-size: 11px; font-weight: 700;
    background: #38bdf8; color: #0b1220;
  }

  /* SVG breathing-shape gradient — applied via stop colors injected per candidate */
  .orb-svg { width: 100%; height: 100%; display: block; }

  /* Smooth transitions on candidate switch */
  .candidate-fade { animation: fadeIn 280ms ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

// ─────────────────────────────────────────────────────────────────────────────
//  Phone-frame screen (the practice screen, themed per candidate)
// ─────────────────────────────────────────────────────────────────────────────

function BreathingOrb({ candidate }) {
  const t = candidate.tokens
  const glow = candidate.ambient.orbGlow
  // We render two stacked SVG circles: an outer "ring" + inner orb gradient.
  // Animation: scale via CSS keyframes (5.5s in / 5.5s out).
  const gradId = `orb-grad-${candidate.key}`
  return html`
    <div class="relative flex items-center justify-center" style=${{ width: 240, height: 240 }}>
      <!-- outer ring -->
      <div class="absolute inset-0 rounded-full" style=${{
        border: `1px solid ${t.ringOuter}`,
      }}></div>
      <!-- inner orb -->
      <div class=${`orb-breathe ${glow || ''}`} style=${{
        width: 200, height: 200, borderRadius: '50%',
        background: `radial-gradient(circle at 35% 35%, ${t.orbInFrom}, ${t.orbInTo} 70%, ${t.orbOutFrom})`,
        border: `1px solid ${t.ringInner}`,
      }}></div>
    </div>
  `
}

function PracticeSwitcher({ candidate, active, setActive }) {
  const t = candidate.tokens
  const items = [
    { id: 'hrv',     label: 'HRV' },
    { id: 'stretch', label: 'Stretch' },
    { id: 'navi',    label: 'Navi' },
  ]
  // Equal-width text-only treatment A (validated in spike 007).
  return html`
    <div
      class="rounded-full p-1 flex items-center"
      style=${{
        background: t.bgSoft,
        border: `1px solid ${t.borderSoft}`,
      }}
    >
      ${items.map(item => {
        const selected = active === item.id
        return html`
          <button
            key=${item.id}
            onClick=${() => setActive(item.id)}
            class="flex-1 px-3 py-2 rounded-full text-sm transition-colors"
            style=${{
              background: selected ? t.accent : 'transparent',
              color:      selected ? t.onAccent : t.textSoft,
              fontWeight: selected ? 600 : 500,
            }}
          >
            ${item.label}
          </button>
        `
      })}
    </div>
  `
}

function MiniIconButton({ candidate, icon }) {
  const t = candidate.tokens
  return html`
    <button
      class="rounded-full p-2"
      style=${{
        background: t.surface,
        border: `1px solid ${t.borderSoft}`,
        color: t.textSoft,
      }}
      aria-label=${icon}
    >
      <span style=${{ fontSize: 16, lineHeight: 1 }}>${icon === 'settings' ? '⚙' : 'ⓘ'}</span>
    </button>
  `
}

function SettingsPeek({ candidate, onClose }) {
  const t = candidate.tokens
  const c = candidate.chrome
  const isGlass = c.kind === 'glass'
  const isGlow  = c.kind === 'glow'
  // Mini modal card — exposes border/chrome behaviour per candidate.
  return html`
    <div
      class="absolute inset-0 flex items-end justify-center"
      style=${{ background: t.modalBackdrop, zIndex: 20 }}
      onClick=${onClose}
    >
      <div
        class=${`w-full rounded-t-3xl p-5 ${isGlass ? 'glass' : ''} candidate-fade`}
        style=${{
          background: isGlass ? undefined : t.surface,
          color: t.text,
          border: `1px solid ${t.borderSoft}`,
          borderBottom: 'none',
          boxShadow: isGlow
            ? `0 -20px 60px ${t.accent}30`
            : `0 -8px 30px rgba(0,0,0,0.08)`,
        }}
        onClick=${(e) => e.stopPropagation()}
      >
        <div class=${`text-xs uppercase tracking-widest mb-4 ${candidate.typography.bodyFamily}`}
             style=${{ color: t.muted }}>
          Settings
        </div>
        <h3 class=${`text-2xl mb-5 ${candidate.typography.headingFamily} ${candidate.typography.headingSpacing}`}
            style=${{ color: t.text, fontWeight: candidate.typography.headingWeight }}>
          Practice
        </h3>
        <!-- Toggle row -->
        ${['Cue sound', 'Per-OM tick'].map((label, idx) => html`
          <div key=${idx} class="flex items-center justify-between py-3"
               style=${{ borderTop: idx > 0 ? `1px solid ${t.borderSoft}` : 'none' }}>
            <span style=${{ color: t.text, fontWeight: 400 }}>${label}</span>
            <button
              role="switch"
              aria-checked="true"
              class="relative rounded-full transition-colors"
              style=${{
                width: 44, height: 24,
                background: t.accent,
              }}
            >
              <span class="absolute top-0.5 rounded-full" style=${{
                width: 20, height: 20, right: 2,
                background: t.onAccent,
                transition: 'all 200ms ease',
              }}></span>
            </button>
          </div>
        `)}
        <!-- Accent button -->
        <button
          class="w-full mt-5 py-3 rounded-full text-sm font-semibold"
          style=${{
            background: t.accent,
            color: t.onAccent,
            letterSpacing: '0.04em',
          }}
          onClick=${onClose}
        >
          Done
        </button>
        <!-- Subtle test of border-only secondary -->
        <button
          class=${`w-full mt-3 py-3 rounded-full text-sm ${candidate.typography.bodyFamily}`}
          style=${{
            background: 'transparent',
            color: t.text,
            border: `1px solid ${t.borderSoft}`,
            fontWeight: 500,
          }}
        >
          Reset stats
        </button>
      </div>
    </div>
  `
}

function PhoneScreen({ candidate, settingsOpen, setSettingsOpen }) {
  const t = candidate.tokens
  const tp = candidate.typography
  const [practice, setPractice] = useState('hrv')
  const [phase, setPhase] = useState('in')

  // Cycle the breathing label every 5.5s (matches orb scale animation).
  useEffect(() => {
    const id = setInterval(() => {
      setPhase(p => (p === 'in' ? 'out' : 'in'))
    }, 5500)
    return () => clearInterval(id)
  }, [])

  const breathLabel = phase === 'in' ? 'In' : 'Out'

  // Bg gradient with edge — mirror real app's bg / bgEdge pattern.
  const bgStyle = {
    background: `radial-gradient(120% 100% at 50% 0%, ${t.bgEdge} 0%, ${t.bg} 45%, ${t.bgSoft} 100%)`,
    color: t.text,
  }

  return html`
    <div class="phone-frame candidate-fade" style=${bgStyle}>
      <div class="phone-notch"></div>
      <!-- Ambient layer behind everything (aurora / mist) -->
      ${candidate.ambient.kind === 'aurora' && html`<div class="aurora-bg"></div>`}
      ${candidate.ambient.kind === 'mist'   && html`<div class="mist-bg"></div>`}
      <!-- Grain overlay (clipped to screen) -->
      ${candidate.ambient.bgClass && html`
        <div class=${`absolute inset-0 pointer-events-none ${candidate.ambient.bgClass}`}
             style=${{ opacity: 0.55 }}></div>
      `}
      <!-- Content -->
      <div class="screen" style=${{ paddingTop: 50 }}>
        <!-- top app bar -->
        <div class="flex items-center justify-between px-5 pb-3">
          <${MiniIconButton} candidate=${candidate} icon="info" />
          <div class=${`text-sm ${tp.bodyFamily}`} style=${{ color: t.textSoft, fontWeight: 500 }}>
            ${practice === 'hrv' ? 'Resonant' : practice === 'stretch' ? 'Stretch' : 'Navi Kriya'}
          </div>
          <${MiniIconButton} candidate=${candidate} icon="settings" />
        </div>
        <!-- practice switcher -->
        <div class="px-5 pb-4">
          <${PracticeSwitcher} candidate=${candidate} active=${practice} setActive=${setPractice} />
        </div>
        <!-- centerpiece: orb + breath label -->
        <div class="flex-1 flex flex-col items-center justify-center px-5"
             style=${{ paddingBottom: 30 }}>
          <${BreathingOrb} candidate=${candidate} />
          <div class=${`mt-8 ${tp.headingFamily} ${tp.headingSpacing}`}
               style=${{
                 fontSize: 36,
                 fontWeight: tp.headingWeight,
                 color: t.text,
               }}>
            ${breathLabel}
          </div>
          <div class=${`mt-2 text-sm ${tp.bodyFamily}`}
               style=${{ color: t.textSoft, fontWeight: 400, letterSpacing: '0.06em' }}>
            5.5 bpm · 3:00 remaining
          </div>
        </div>
        <!-- bottom controls -->
        <div class="px-5 pb-8">
          <button
            class="w-full py-4 rounded-full text-base"
            style=${{
              background: t.accent,
              color: t.onAccent,
              fontWeight: 600,
              letterSpacing: '0.05em',
            }}
          >
            Start
          </button>
          <div class=${`mt-4 text-center text-xs ${tp.bodyFamily}`}
               style=${{ color: t.muted, letterSpacing: '0.08em' }}>
            12 MIN TODAY · STREAK 5d
          </div>
        </div>
      </div>
      <!-- Settings peek overlay -->
      ${settingsOpen && html`<${SettingsPeek} candidate=${candidate} onClose=${() => setSettingsOpen(false)} />`}
    </div>
  `
}

// ─────────────────────────────────────────────────────────────────────────────
//  Harness (top bar + phone frame + side panel)
// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [activeKey, setActiveKey] = useState('soft-morning')
  const [shortlist, setShortlist] = useState(new Set())
  const [settingsOpen, setSettingsOpen] = useState(false)

  const active = CANDIDATES.find(c => c.key === activeKey)

  // Keyboard shortcuts: 1–6 to flip candidates, S to toggle settings peek.
  useEffect(() => {
    const onKey = (e) => {
      const idx = '123456'.indexOf(e.key)
      if (idx >= 0 && CANDIDATES[idx]) setActiveKey(CANDIDATES[idx].key)
      if (e.key === 's' || e.key === 'S') setSettingsOpen(o => !o)
    }
    window.addEventListener('keydown', onKey)
    return () => window.removeEventListener('keydown', onKey)
  }, [])

  const toggleShortlist = (key) => {
    setShortlist(prev => {
      const next = new Set(prev)
      if (next.has(key)) next.delete(key)
      else next.add(key)
      return next
    })
  }

  return html`
    <div class="min-h-screen flex flex-col">
      <!-- Harness bar — clearly labelled NOT part of product -->
      <div class="harness-bar px-6 py-4">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div class="flex items-center gap-3">
            <span class="text-xs uppercase tracking-widest text-sky-300">Harness · not part of product</span>
            <span class="text-slate-500 text-xs">Spike 009 — look &amp; feel alternatives (1–6, S settings)</span>
          </div>
          <div class="flex items-center gap-2">
            ${CANDIDATES.map(c => html`
              <button
                key=${c.key}
                onClick=${() => setActiveKey(c.key)}
                class=${`letter-btn px-3 py-1.5 rounded-md text-sm ${activeKey === c.key ? 'active' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}
                title=${c.name}
              >
                ${c.letter}
              </button>
            `)}
            <button
              onClick=${() => setSettingsOpen(o => !o)}
              class="ml-3 px-3 py-1.5 rounded-md text-sm bg-slate-800 text-slate-300 hover:bg-slate-700"
            >
              ${settingsOpen ? 'Hide settings peek' : 'Settings peek'}
            </button>
          </div>
        </div>
        <!-- Active candidate header + shortlist toggle + summary -->
        <div class="mt-3 flex items-center justify-between flex-wrap gap-3">
          <div>
            <div class="text-base text-slate-100 font-semibold">
              ${active.letter}. ${active.name}
              <span class="ml-2 text-xs text-slate-400 font-normal">— ${active.mood}</span>
            </div>
            <div class="text-xs text-slate-400 mt-0.5 max-w-2xl">${active.summary}</div>
          </div>
          <div class="flex items-center gap-3">
            <button
              onClick=${() => toggleShortlist(active.key)}
              class=${`px-3 py-1.5 rounded-md text-sm ${shortlist.has(active.key) ? 'bg-emerald-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}
            >
              ${shortlist.has(active.key) ? '✓ shortlisted' : '+ shortlist'}
            </button>
            <div class="text-xs text-slate-400">
              Shortlist:
              ${shortlist.size === 0 && html`<span class="ml-1 text-slate-500">none</span>`}
              ${[...shortlist].map(k => {
                const c = CANDIDATES.find(x => x.key === k)
                return html`<span key=${k} class="chip ml-1" title=${c.name}>${c.letter}</span>`
              })}
            </div>
          </div>
        </div>
      </div>

      <!-- Main stage: phone + side panel -->
      <div class="flex-1 flex items-start justify-center gap-10 p-10 flex-wrap">
        <${PhoneScreen}
          key=${active.key}
          candidate=${active}
          settingsOpen=${settingsOpen}
          setSettingsOpen=${setSettingsOpen}
        />
        <!-- Token panel (the recipe for whoever ports the winner into theme.css) -->
        <div class="text-slate-200 max-w-md text-xs leading-relaxed">
          <h2 class="text-base font-semibold mb-3 text-slate-100">
            ${active.letter}. ${active.name} — token recipe
          </h2>
          <div class="grid grid-cols-2 gap-x-4 gap-y-1 mb-4">
            ${Object.entries(active.tokens).map(([k, v]) => html`
              <div key=${k} class="flex items-center gap-2">
                <span
                  class="inline-block rounded-sm border border-slate-700"
                  style=${{ width: 14, height: 14, background: v }}
                ></span>
                <span class="text-slate-400">${k}</span>
                <span class="text-slate-500 ml-auto font-mono text-[10px]">${typeof v === 'string' ? v : ''}</span>
              </div>
            `)}
          </div>
          <div class="mb-2">
            <span class="text-slate-400">heading: </span>
            <span class="text-slate-200 font-mono">${active.typography.headingFamily.replace('font-', '')}</span>
            <span class="text-slate-500"> · weight ${active.typography.headingWeight}</span>
          </div>
          <div class="mb-2">
            <span class="text-slate-400">body: </span>
            <span class="text-slate-200 font-mono">${active.typography.bodyFamily.replace('font-', '')}</span>
            <span class="text-slate-500"> · weight ${active.typography.bodyWeight}</span>
          </div>
          <div class="mb-2">
            <span class="text-slate-400">ambient: </span>
            <span class="text-slate-200 font-mono">${active.ambient.kind}</span>
            ${active.ambient.orbGlow && html`<span class="text-slate-500"> · halo: ${active.ambient.orbGlow}</span>`}
          </div>
          <div>
            <span class="text-slate-400">chrome: </span>
            <span class="text-slate-200 font-mono">${active.chrome.kind}</span>
          </div>
        </div>
      </div>
    </div>
  `
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`)
</script>
</body>
</html>
