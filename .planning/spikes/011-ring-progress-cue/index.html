<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike 011 — Ring Progress Cue</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    /* Theme tokens — transcribed verbatim from src/styles/theme.css */
    :root {
      --color-breathing-bg: #f3f5f7;
      --color-breathing-bg-soft: #e8eaee;
      --color-breathing-surface: #ffffff;
      --color-breathing-accent: #5d6877;
      --color-breathing-accent-strong: #414957;
      --color-breathing-muted: #969ba6;
      --color-breathing-on-accent: #ffffff;
      --color-breathing-text: #3a4150;
      --color-breathing-text-soft: #6b7280;
      --color-border-soft: rgba(93, 104, 119, 0.16);
      --color-orb-halo-1: rgba(168, 173, 183, 0.22);
      --color-orb-halo-2: rgba(120, 128, 140, 0.32);
      --color-orb-halo-3: rgba(93, 104, 119, 0.50);
      --orb-size: clamp(180px, 50vw, 280px);
    }
    html.dark {
      --color-breathing-bg: #1a1d24;
      --color-breathing-bg-soft: #23272f;
      --color-breathing-surface: #252932;
      --color-breathing-accent: #b4bac4;
      --color-breathing-accent-strong: #ccd0d9;
      --color-breathing-muted: #6a6e76;
      --color-breathing-on-accent: #1a1d24;
      --color-breathing-text: #dde0e6;
      --color-breathing-text-soft: #8a8d95;
      --color-border-soft: rgba(168, 174, 184, 0.16);
      --color-orb-halo-1: rgba(74, 78, 88, 0.30);
      --color-orb-halo-2: rgba(108, 113, 124, 0.38);
      --color-orb-halo-3: rgba(150, 156, 168, 0.52);
    }
    html.desktop-size { --orb-size: 320px; }

    body {
      background: var(--color-breathing-bg);
      color: var(--color-breathing-text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'https://esm.sh/react@19.0.0'
    import ReactDOM from 'https://esm.sh/react-dom@19.0.0/client'
    import htm from 'https://esm.sh/htm@3.1.1'

    // Wrap createElement so htm's `<>...</>` fragment shorthand resolves to
    // React.Fragment. htm calls h('', ...) for `<>` (empty-string type, not
    // null) — which is why a plain `== null` check missed it on the first
    // attempt. Any falsy/non-string-non-function type means a fragment.
    const html = htm.bind((type, props, ...children) =>
      React.createElement(type || React.Fragment, props, ...children)
    )
    const { useState, useEffect, useRef, useCallback } = React

    // --------------------------------------------------------------------------
    // Production constants — verbatim from src/components/shapeConstants.ts
    // and src/components/OrbShape.tsx (HRV app, current main).
    // --------------------------------------------------------------------------
    const MIN_SCALE = 0.58
    const MAX_SCALE = 1.0
    const MID_SCALE = (MIN_SCALE + MAX_SCALE) / 2 // 0.79
    const DISC_PCT = 0.62
    const RING_TRANSITION = 'opacity 600ms ease'
    const DISC_BG_TRANSITION = 'background 400ms ease-in-out'
    const V1_RING_OPACITY = 0.45
    const V1_DISC_SHADOW = '0 6px 24px var(--color-border-soft)'

    const V1_HALOS = [
      { token: '--color-orb-halo-1', pct: 1.0,  radius: '48% 52% 51% 49% / 50% 49% 51% 50%', shift: [-4,  2] },
      { token: '--color-orb-halo-2', pct: 0.86, radius: '52% 48% 49% 51% / 49% 52% 48% 51%', shift: [ 3, -2] },
      { token: '--color-orb-halo-3', pct: 0.74, radius: '50% 50% 53% 47% / 51% 49% 51% 49%', shift: [-1,  3] },
    ]

    // --------------------------------------------------------------------------
    // Settings space — verbatim from src/domain/settings.ts
    // --------------------------------------------------------------------------
    const BPM_OPTIONS = [1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5, 5.5, 6, 6.5, 7]
    const RATIO_OPTIONS = [
      { label: '50:50', inhalePct: 50 },
      { label: '40:60', inhalePct: 40 },
      { label: '30:70', inhalePct: 30 },
      { label: '20:80', inhalePct: 20 },
    ]
    const DEFAULT_BPM = 5.5
    const DEFAULT_RATIO = '40:60'

    // --------------------------------------------------------------------------
    // Phase math — verbatim shape from src/domain/sessionMath.ts
    // --------------------------------------------------------------------------
    function getFrame(bpm, ratioLabel, elapsedMs) {
      const cycleMs = 60_000 / bpm
      const ratio = RATIO_OPTIONS.find(r => r.label === ratioLabel)
      const inhaleMs = cycleMs * (ratio.inhalePct / 100)
      const exhaleMs = cycleMs - inhaleMs
      const cycleElapsed = elapsedMs % cycleMs
      const isInPhase = cycleElapsed < inhaleMs
      const phaseElapsed = isInPhase ? cycleElapsed : cycleElapsed - inhaleMs
      const phaseDuration = isInPhase ? inhaleMs : exhaleMs
      const phaseProgress = phaseDuration === 0 ? 0 : phaseElapsed / phaseDuration
      return {
        phase: isInPhase ? 'in' : 'out',
        phaseProgress: Math.min(1, Math.max(0, phaseProgress)),
        cycleIndex: Math.floor(elapsedMs / cycleMs),
        cycleMs, inhaleMs, exhaleMs,
      }
    }

    // --------------------------------------------------------------------------
    // Variant A — production rings: always-visible outer, inner fades on exhale.
    // Transcribed from OrbShape.tsx OrbContainer ring block.
    // --------------------------------------------------------------------------
    function RingsA({ phase, reducedMotion }) {
      const innerVisible = phase === 'out' ? 1 : 0
      return html`
        <>
          <span aria-hidden="true" class="absolute" style=${{
            inset: 0,
            border: '1.5px solid var(--color-breathing-accent)',
            borderRadius: '50%',
            opacity: V1_RING_OPACITY,
          }} />
          ${!reducedMotion && html`
            <span aria-hidden="true" class="absolute" style=${{
              width: `${MIN_SCALE * 100}%`,
              height: `${MIN_SCALE * 100}%`,
              top: '50%', left: '50%',
              transform: 'translate(-50%, -50%)',
              border: '1.5px solid var(--color-breathing-accent)',
              borderRadius: '50%',
              opacity: innerVisible * V1_RING_OPACITY,
              transition: RING_TRANSITION,
            }} />
          `}
        </>
      `
    }

    // --------------------------------------------------------------------------
    // Variant B — alternative: same faint outer track, plus a thicker SVG arc
    // that grows BIDIRECTIONALLY from 6-o'clock (south). The right and left
    // halves expand symmetrically and meet at 12-o'clock (north) at the end of
    // inhale, forming one closed ring. Exhale reverses the motion symmetrically
    // back to a dot at south. Two SVG arc paths, one continuous motion.
    //
    // We compute the arc's endpoint dynamically per frame and emit a single
    // continuous arc per half — no stroke-dasharray. Earlier dasharray-based
    // approaches (with or without pathLength + vector-effect non-scaling-stroke)
    // rendered as broken segments in Chrome; computing endpoints removes that
    // dependency entirely.
    //
    // r = 49.7 places the stroke center near the locus of the production
    // faint-ring border (at orb-size 240: (240 − 1.5) / 2 / 240 × 100 ≈ 49.69).
    //
    // Parametrization (SVG y-down, CW positive):
    //   south  ↔ angle = π/2
    //   east   ↔ angle = 0      (right side midpoint)
    //   north  ↔ angle = -π/2 (right) or 3π/2 (left)
    //   west   ↔ angle = π
    //   right arc: angle = π/2 − t·π   for t ∈ [0, 1]
    //   left  arc: angle = π/2 + t·π   for t ∈ [0, 1]
    //   sweep-flag: 1 (right, CW visually) / 0 (left, CCW visually)
    // --------------------------------------------------------------------------
    function RingsB({ phase, phaseProgress, reducedMotion, progressStrokeWidth }) {
      const r = 49.7
      const south = 50 + r
      const north = 50 - r
      const t = phase === 'in' ? phaseProgress : 1 - phaseProgress
      const showArc = !reducedMotion && t > 0

      let rightD = ''
      let leftD = ''
      if (t >= 1) {
        // Closed ring: full semicircle on each side. sweep-flag: 0=right side
        // (through east), 1=left side (through west) — the inverse of what
        // SVG's "CW direction" intuition suggests for a south-start path.
        rightD = `M 50 ${south} A ${r} ${r} 0 0 0 50 ${north}`
        leftD  = `M 50 ${south} A ${r} ${r} 0 0 1 50 ${north}`
      } else if (t > 0) {
        const angleR = Math.PI / 2 - t * Math.PI
        const angleL = Math.PI / 2 + t * Math.PI
        const endXR = 50 + r * Math.cos(angleR)
        const endYR = 50 + r * Math.sin(angleR)
        const endXL = 50 + r * Math.cos(angleL)
        const endYL = 50 + r * Math.sin(angleL)
        rightD = `M 50 ${south} A ${r} ${r} 0 0 0 ${endXR.toFixed(4)} ${endYR.toFixed(4)}`
        leftD  = `M 50 ${south} A ${r} ${r} 0 0 1 ${endXL.toFixed(4)} ${endYL.toFixed(4)}`
      }

      return html`
        <>
          <span aria-hidden="true" class="absolute" style=${{
            inset: 0,
            border: '1.5px solid var(--color-breathing-accent)',
            borderRadius: '50%',
            opacity: V1_RING_OPACITY,
          }} />
          ${showArc && html`
            <svg aria-hidden="true" class="absolute pointer-events-none"
                 viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
                 style=${{ inset: 0, width: '100%', height: '100%' }}>
              <path d=${rightD}
                    stroke="var(--color-breathing-accent)" fill="none"
                    strokeLinecap="round" strokeWidth=${progressStrokeWidth}
                    vectorEffect="non-scaling-stroke" />
              <path d=${leftD}
                    stroke="var(--color-breathing-accent)" fill="none"
                    strokeLinecap="round" strokeWidth=${progressStrokeWidth}
                    vectorEffect="non-scaling-stroke" />
            </svg>
          `}
        </>
      `
    }

    // --------------------------------------------------------------------------
    // OrbBody — halos + centre disc + In/Out label. Production-faithful.
    // --------------------------------------------------------------------------
    function OrbBody({ scale, phaseLabel }) {
      return html`
        <div class="absolute inset-0 flex items-center justify-center"
             style=${{ transform: `translate3d(0,0,0) scale(${scale})` }}>
          ${V1_HALOS.map((h, i) => html`
            <div key=${i} aria-hidden="true" class="absolute" style=${{
              width: `${h.pct * 100}%`,
              height: `${h.pct * 100}%`,
              borderRadius: h.radius,
              background: `var(${h.token})`,
              transform: `translate(${h.shift[0]}px, ${h.shift[1]}px)`,
            }} />
          `)}
          <div class="absolute flex items-center justify-center" style=${{
            width: `${DISC_PCT * 100}%`,
            height: `${DISC_PCT * 100}%`,
            borderRadius: '50%',
            background: 'var(--color-breathing-accent)',
            color: 'var(--color-breathing-on-accent)',
            boxShadow: V1_DISC_SHADOW,
            transition: DISC_BG_TRANSITION,
          }}>
            <span class="font-semibold tracking-tight text-3xl sm:text-4xl"
                  style=${{ position: 'relative', zIndex: 10 }}>
              ${phaseLabel}
            </span>
          </div>
        </div>
      `
    }

    // --------------------------------------------------------------------------
    // Stage — production OrbContainer shape with the selected ring variant.
    // --------------------------------------------------------------------------
    function Stage({ variant, frame, reducedMotion, progressStrokeWidth }) {
      const live = MIN_SCALE +
        (frame.phase === 'in' ? frame.phaseProgress : 1 - frame.phaseProgress) *
        (MAX_SCALE - MIN_SCALE)
      const scale = reducedMotion ? MID_SCALE : live
      const phaseLabel = frame.phase === 'in' ? 'In' : 'Out'
      return html`
        <div class="relative mx-auto grid place-items-center"
             style=${{ width: 'var(--orb-size)', height: 'var(--orb-size)' }}
             data-variant=${variant}
             data-phase=${frame.phase}
             data-progress=${frame.phaseProgress.toFixed(3)}>
          ${variant === 'A'
            ? html`<${RingsA} phase=${frame.phase} reducedMotion=${reducedMotion} />`
            : html`<${RingsB} phase=${frame.phase} phaseProgress=${frame.phaseProgress}
                              reducedMotion=${reducedMotion}
                              progressStrokeWidth=${progressStrokeWidth} />`}
          <${OrbBody} scale=${scale} phaseLabel=${phaseLabel} />
        </div>
      `
    }

    // --------------------------------------------------------------------------
    // App — harness bar + stage + tempo controls + readouts.
    // --------------------------------------------------------------------------
    function App() {
      const [variant, setVariant] = useState('A')
      const [bpm, setBpm] = useState(DEFAULT_BPM)
      const [ratio, setRatio] = useState(DEFAULT_RATIO)
      const [theme, setTheme] = useState('light')
      const [running, setRunning] = useState(false)
      const [reducedMotion, setReducedMotion] = useState(false)
      const [desktopSize, setDesktopSize] = useState(false)
      const [progressStrokeWidth, setProgressStrokeWidth] = useState(2.5)
      const [frame, setFrame] = useState({ phase: 'in', phaseProgress: 0, cycleIndex: 0 })
      const elapsedRef = useRef(0)
      const lastTickRef = useRef(null)
      const rafRef = useRef(null)

      useEffect(() => {
        const root = document.documentElement
        root.classList.toggle('dark', theme === 'dark')
        root.classList.toggle('desktop-size', desktopSize)
      }, [theme, desktopSize])

      useEffect(() => {
        if (!running) {
          lastTickRef.current = null
          if (rafRef.current) cancelAnimationFrame(rafRef.current)
          return
        }
        const tick = (now) => {
          if (lastTickRef.current == null) lastTickRef.current = now
          const delta = now - lastTickRef.current
          lastTickRef.current = now
          elapsedRef.current += delta
          setFrame(getFrame(bpm, ratio, elapsedRef.current))
          rafRef.current = requestAnimationFrame(tick)
        }
        rafRef.current = requestAnimationFrame(tick)
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current)
        }
      }, [running, bpm, ratio])

      const handleStartPause = useCallback(() => setRunning(r => !r), [])
      const handleReset = useCallback(() => {
        elapsedRef.current = 0
        lastTickRef.current = null
        setFrame({ phase: 'in', phaseProgress: 0, cycleIndex: 0 })
      }, [])

      const cycleSec = (60 / bpm)
      const ratioObj = RATIO_OPTIONS.find(r => r.label === ratio)
      const inhaleSec = cycleSec * (ratioObj.inhalePct / 100)
      const exhaleSec = cycleSec - inhaleSec

      return html`
        <div class="min-h-screen flex flex-col">
          <!-- HARNESS BAR (NOT product) -->
          <div class="bg-zinc-900 text-zinc-200 text-sm px-4 py-3 flex flex-wrap gap-x-6 gap-y-2 items-center">
            <div class="uppercase tracking-wider text-[10px] text-zinc-500 font-semibold">
              harness · spike 011 · not product
            </div>

            <div class="flex gap-2 items-center">
              <span class="text-zinc-400 text-xs uppercase tracking-wider">Variant</span>
              ${['A', 'B'].map(v => html`
                <button key=${v} onClick=${() => setVariant(v)}
                  class=${`px-3 py-1 rounded text-xs ${variant === v ? 'bg-zinc-100 text-zinc-900 font-medium' : 'bg-zinc-800 hover:bg-zinc-700'}`}>
                  ${v === 'A' ? 'A · Production (outer + inner)' : 'B · Progress arc'}
                </button>
              `)}
            </div>

            <div class="flex gap-2 items-center">
              <span class="text-zinc-400 text-xs uppercase tracking-wider">Theme</span>
              ${['light', 'dark'].map(t => html`
                <button key=${t} onClick=${() => setTheme(t)}
                  class=${`px-2 py-1 rounded text-xs ${theme === t ? 'bg-zinc-100 text-zinc-900 font-medium' : 'bg-zinc-800 hover:bg-zinc-700'}`}>
                  ${t}
                </button>
              `)}
            </div>

            <label class="flex gap-2 items-center cursor-pointer text-xs">
              <input type="checkbox" checked=${reducedMotion}
                     onChange=${(e) => setReducedMotion(e.target.checked)} />
              <span class="text-zinc-400">reduced-motion override</span>
            </label>

            <label class="flex gap-2 items-center cursor-pointer text-xs">
              <input type="checkbox" checked=${desktopSize}
                     onChange=${(e) => setDesktopSize(e.target.checked)} />
              <span class="text-zinc-400">desktop size (320 px)</span>
            </label>

            ${variant === 'B' && html`
              <div class="flex gap-2 items-center">
                <span class="text-zinc-400 text-xs uppercase tracking-wider">B stroke</span>
                ${[1.5, 2, 2.5, 3, 4].map(w => html`
                  <button key=${w} onClick=${() => setProgressStrokeWidth(w)}
                    class=${`px-2 py-1 rounded text-xs ${progressStrokeWidth === w ? 'bg-zinc-100 text-zinc-900 font-medium' : 'bg-zinc-800 hover:bg-zinc-700'}`}>
                    ${w}px
                  </button>
                `)}
              </div>
            `}
          </div>

          <!-- STAGE -->
          <div class="flex-1 flex flex-col items-center justify-center px-4 py-6 gap-6">
            <${Stage} variant=${variant} frame=${frame} reducedMotion=${reducedMotion}
                       progressStrokeWidth=${progressStrokeWidth} />

            <!-- Tempo + transport -->
            <div class="flex flex-wrap gap-3 justify-center items-center"
                 style=${{ color: 'var(--color-breathing-text)' }}>
              <label class="flex gap-2 items-center text-sm">
                <span style=${{ color: 'var(--color-breathing-text-soft)' }}>BPM</span>
                <select value=${bpm} onChange=${(e) => setBpm(Number(e.target.value))}
                        class="bg-transparent border rounded px-2 py-1 text-sm"
                        style=${{ borderColor: 'var(--color-border-soft)', color: 'var(--color-breathing-text)' }}>
                  ${BPM_OPTIONS.map(b => html`<option key=${b} value=${b}>${b}</option>`)}
                </select>
              </label>
              <label class="flex gap-2 items-center text-sm">
                <span style=${{ color: 'var(--color-breathing-text-soft)' }}>Ratio (in:out)</span>
                <select value=${ratio} onChange=${(e) => setRatio(e.target.value)}
                        class="bg-transparent border rounded px-2 py-1 text-sm"
                        style=${{ borderColor: 'var(--color-border-soft)', color: 'var(--color-breathing-text)' }}>
                  ${RATIO_OPTIONS.map(r => html`<option key=${r.label} value=${r.label}>${r.label}</option>`)}
                </select>
              </label>
              <button onClick=${handleStartPause}
                      class="px-4 py-1.5 rounded font-medium text-sm"
                      style=${{
                        background: 'var(--color-breathing-accent)',
                        color: 'var(--color-breathing-on-accent)',
                      }}>
                ${running ? 'Pause' : 'Start'}
              </button>
              <button onClick=${handleReset}
                      class="px-3 py-1.5 rounded text-sm"
                      style=${{ color: 'var(--color-breathing-text-soft)', border: '1px solid var(--color-border-soft)' }}>
                Reset
              </button>
            </div>

            <!-- Depth-probe presets -->
            <div class="flex gap-2 flex-wrap justify-center">
              ${[
                { label: 'Default · 5.5 BPM @ 40:60', bpm: 5.5, ratio: '40:60' },
                { label: 'Fastest · 7 BPM @ 50:50',  bpm: 7,   ratio: '50:50' },
                { label: 'Slow asym · 3 BPM @ 30:70',bpm: 3,   ratio: '30:70' },
                { label: 'Very slow · 2 BPM @ 50:50',bpm: 2,   ratio: '50:50' },
              ].map(p => html`
                <button key=${p.label}
                  onClick=${() => { setBpm(p.bpm); setRatio(p.ratio) }}
                  class="px-2 py-1 rounded text-xs"
                  style=${{ color: 'var(--color-breathing-text-soft)', border: '1px solid var(--color-border-soft)' }}>
                  ${p.label}
                </button>
              `)}
            </div>

            <!-- Readout -->
            <div class="text-xs grid grid-cols-3 gap-x-6 gap-y-1 text-center"
                 style=${{ color: 'var(--color-breathing-text-soft)' }}>
              <div>cycle ${cycleSec.toFixed(2)}s</div>
              <div>in ${inhaleSec.toFixed(2)}s</div>
              <div>out ${exhaleSec.toFixed(2)}s</div>
              <div>phase ${frame.phase}</div>
              <div>progress ${frame.phaseProgress.toFixed(3)}</div>
              <div>cycle # ${frame.cycleIndex}</div>
            </div>
          </div>
        </div>
      `
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
