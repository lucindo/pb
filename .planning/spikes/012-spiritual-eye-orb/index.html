<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike 012 — Spiritual Eye Orb (Kutastha)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    /* Mono Zen tokens — transcribed verbatim from src/styles/theme.css */
    :root {
      --color-breathing-bg: #f3f5f7;
      --color-breathing-bg-soft: #e8eaee;
      --color-breathing-surface: #ffffff;
      --color-breathing-accent: #5d6877;
      --color-breathing-accent-strong: #414957;
      --color-breathing-muted: #969ba6;
      --color-breathing-on-accent: #ffffff;
      --color-breathing-text: #3a4150;
      --color-breathing-text-soft: #6b7280;
      --color-border-soft: rgba(93, 104, 119, 0.16);
      --color-orb-halo-1: rgba(168, 173, 183, 0.22);
      --color-orb-halo-2: rgba(120, 128, 140, 0.32);
      --color-orb-halo-3: rgba(93, 104, 119, 0.50);
      --orb-size: 220px;
    }
    html.dark {
      --color-breathing-bg: #1a1d24;
      --color-breathing-bg-soft: #23272f;
      --color-breathing-surface: #252932;
      --color-breathing-accent: #b4bac4;
      --color-breathing-accent-strong: #ccd0d9;
      --color-breathing-muted: #6a6e76;
      --color-breathing-on-accent: #1a1d24;
      --color-breathing-text: #dde0e6;
      --color-breathing-text-soft: #8a8d95;
      --color-border-soft: rgba(168, 174, 184, 0.16);
      --color-orb-halo-1: rgba(74, 78, 88, 0.30);
      --color-orb-halo-2: rgba(108, 113, 124, 0.38);
      --color-orb-halo-3: rgba(150, 156, 168, 0.52);
    }

    body {
      background: var(--color-breathing-bg);
      color: var(--color-breathing-text);
      font-family: ui-sans-serif, system-ui, -apple-system, 'Inter', sans-serif;
      transition: background-color 200ms ease, color 200ms ease;
    }

    /* Harness chrome — explicitly NOT product. Dark band so it never reads as UI. */
    .harness {
      background: #0f1116;
      color: #cfd2da;
      border-bottom: 1px solid #1c1f27;
    }
    .harness button, .harness select {
      background: #1c1f27;
      color: #e6e8ed;
      border: 1px solid #2a2e38;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .harness button:hover { background: #262a35; }
    .harness button[data-active='true'] { background: #2f343f; border-color: #4a4f5b; }
    .harness .badge { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #7c8190; }

    .card {
      background: var(--color-breathing-surface);
      border: 1px solid var(--color-border-soft);
      border-radius: 18px;
      padding: 18px 16px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .card .name {
      font-weight: 600;
      font-size: 14px;
      color: var(--color-breathing-text);
      letter-spacing: -0.01em;
    }
    .card .desc {
      font-size: 11px;
      color: var(--color-breathing-text-soft);
      line-height: 1.4;
      text-align: center;
      max-width: 220px;
      min-height: 30px;
    }
    .card .shortlist {
      font-size: 11px;
      color: var(--color-breathing-text-soft);
      border: 1px solid var(--color-border-soft);
      border-radius: 999px;
      padding: 3px 10px;
      cursor: pointer;
      user-select: none;
    }
    .card .shortlist[data-on='true'] {
      background: var(--color-breathing-accent);
      color: var(--color-breathing-on-accent);
      border-color: var(--color-breathing-accent);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from 'https://esm.sh/react@19.0.0'
    import ReactDOM from 'https://esm.sh/react-dom@19.0.0/client'
    import htm from 'https://esm.sh/htm@3.1.1'

    const html = htm.bind((type, props, ...children) =>
      React.createElement(type === '' ? React.Fragment : type, props, ...children)
    )
    const { useState, useEffect, useRef } = React

    // ───────────────────────────────────────────────────────────────────────
    // Scale + geometry — verbatim from src/components/OrbShape.tsx
    // ───────────────────────────────────────────────────────────────────────
    const MIN_SCALE = 0.58
    const MAX_SCALE = 1.0
    const MID_SCALE = 0.79
    const DISC_PCT = 0.62
    const V1_HALOS = [
      { pct: 1.0,  radius: '48% 52% 51% 49% / 50% 49% 51% 50%', shift: [-4, 2] },
      { pct: 0.86, radius: '52% 48% 49% 51% / 49% 52% 48% 51%', shift: [3, -2] },
      { pct: 0.74, radius: '50% 50% 53% 47% / 51% 49% 51% 49%', shift: [-1, 3] },
    ]
    const RING_OPACITY = 0.45

    // ───────────────────────────────────────────────────────────────────────
    // Variant palette overrides — each variant is a token *patch* over the
    // production Mono Zen palette. Light + dark hand-tuned per variant; null
    // means "inherit the production token". Halos may be either an rgba
    // string (overrides --color-orb-halo-N) or null (production).
    // ───────────────────────────────────────────────────────────────────────
    const VARIANTS = [
      {
        id: 'v1',
        name: 'V1  Tonal Zen',
        desc: 'Production orb + soft pearl 5-point star. Mono Zen palette untouched; star is the only kutastha cue.',
        light: {
          ring: null,
          halos: [null, null, null],
          disc: null,
          star: { fill: '#f4f1e8', stroke: 'rgba(58, 65, 80, 0.18)', size: 0.34, strokeWidth: 0.6 },
        },
        dark: {
          ring: null,
          halos: [null, null, null],
          disc: null,
          star: { fill: '#e8eaf2', stroke: 'rgba(221, 224, 230, 0.20)', size: 0.34, strokeWidth: 0.6 },
        },
      },
      {
        id: 'v2',
        name: 'V2  Champagne Flame',
        desc: 'Mono Zen interior + warm muted-champagne outer ring (the only warm element). Pearl star.',
        light: {
          ring: 'rgba(196, 162, 99, 0.62)',
          halos: [null, null, null],
          disc: null,
          star: { fill: '#f4f1e8', stroke: 'rgba(58, 65, 80, 0.18)', size: 0.34, strokeWidth: 0.6 },
        },
        dark: {
          ring: 'rgba(208, 178, 118, 0.55)',
          halos: [null, null, null],
          disc: null,
          star: { fill: '#e8eaf2', stroke: 'rgba(221, 224, 230, 0.20)', size: 0.34, strokeWidth: 0.6 },
        },
      },
      {
        id: 'v3',
        name: 'V3  Indigo Field',
        desc: 'Cool ring + indigo-shifted halos and disc (the blue field). Crisp silver star at the centre.',
        light: {
          ring: null,
          halos: [
            'rgba(140, 148, 178, 0.22)',
            'rgba(106, 116, 152, 0.32)',
            'rgba(82, 92, 130, 0.50)',
          ],
          disc: '#4e5778',
          discOn: '#f4f1e8',
          star: { fill: '#ffffff', stroke: 'rgba(255,255,255,0.18)', size: 0.40, strokeWidth: 0.7 },
        },
        dark: {
          ring: null,
          halos: [
            'rgba(82, 88, 112, 0.30)',
            'rgba(108, 116, 144, 0.38)',
            'rgba(138, 148, 178, 0.52)',
          ],
          disc: '#9aa1c0',
          discOn: '#1a1d24',
          star: { fill: '#fafafe', stroke: 'rgba(255,255,255,0.10)', size: 0.40, strokeWidth: 0.7 },
        },
      },
      {
        id: 'v4',
        name: 'V4  Tri-Light',
        desc: 'All three kutastha layers, restrained: muted gold ring, indigo halos+disc, bright white star. Closest to canonical imagery.',
        light: {
          ring: 'rgba(184, 148, 78, 0.70)',
          halos: [
            'rgba(140, 148, 178, 0.22)',
            'rgba(106, 116, 152, 0.32)',
            'rgba(82, 92, 130, 0.50)',
          ],
          disc: '#4e5778',
          discOn: '#f4f1e8',
          star: { fill: '#ffffff', stroke: 'rgba(255,255,255,0.20)', size: 0.42, strokeWidth: 0.7 },
        },
        dark: {
          ring: 'rgba(208, 168, 96, 0.60)',
          halos: [
            'rgba(82, 88, 112, 0.30)',
            'rgba(108, 116, 144, 0.38)',
            'rgba(138, 148, 178, 0.52)',
          ],
          disc: '#9aa1c0',
          discOn: '#1a1d24',
          star: { fill: '#fafafe', stroke: 'rgba(255,255,255,0.12)', size: 0.42, strokeWidth: 0.7 },
        },
      },
      {
        id: 'v5',
        name: 'V5  Halo Flame',
        desc: 'Warm-to-cool gradient across the three halos (champagne → slate-warm → slate). Opalescent indigo disc with a radial luminosity. Small white star kernel at centre.',
        light: {
          ring: null,
          halos: [
            'rgba(202, 166, 98, 0.48)',
            'rgba(168, 148, 116, 0.44)',
            'rgba(93, 104, 119, 0.50)',
          ],
          disc: 'radial-gradient(circle at 50% 42%, #4a5a96 0%, #34406f 60%, #2a356a 100%)',
          discOn: '#ffffff',
          star: { fill: '#ffffff', stroke: 'rgba(255,255,255,0.20)', size: 0.20, strokeWidth: 0.5 },
        },
        dark: {
          ring: null,
          halos: [
            'rgba(206, 168, 100, 0.45)',
            'rgba(170, 156, 122, 0.46)',
            'rgba(150, 156, 168, 0.52)',
          ],
          disc: 'radial-gradient(circle at 50% 42%, #6c7cb6 0%, #4a5a96 60%, #38477e 100%)',
          discOn: '#ffffff',
          star: { fill: '#fafafe', stroke: 'rgba(255,255,255,0.12)', size: 0.20, strokeWidth: 0.5 },
        },
      },
    ]

    // ───────────────────────────────────────────────────────────────────────
    // Five-pointed star SVG — geometric, sharp (kutastha "razor-sharp star").
    // Uses standard star polygon: 5 outer + 5 inner points, ratio outer/inner
    // = 2.5 for a sharp "Yogananda style" silhouette (not a chubby dingbat).
    // ───────────────────────────────────────────────────────────────────────
    function StarPath({ fill, stroke, strokeWidth }) {
      const cx = 50, cy = 50
      const rOuter = 48
      const rInner = rOuter / 2.5
      const pts = []
      for (let i = 0; i < 10; i++) {
        const angle = -Math.PI / 2 + (i * Math.PI) / 5
        const r = i % 2 === 0 ? rOuter : rInner
        pts.push(`${(cx + r * Math.cos(angle)).toFixed(2)},${(cy + r * Math.sin(angle)).toFixed(2)}`)
      }
      return html`
        <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
             style=${{ width: '100%', height: '100%', display: 'block' }}>
          <polygon points=${pts.join(' ')}
                   fill=${fill}
                   stroke=${stroke}
                   strokeWidth=${strokeWidth}
                   strokeLinejoin="round" />
        </svg>
      `
    }

    // ───────────────────────────────────────────────────────────────────────
    // Variant orb — same geometry as production OrbShape; per-variant token
    // overrides applied as inline style. Drives off shared (phase, progress).
    // ───────────────────────────────────────────────────────────────────────
    function VariantOrb({ variant, theme, mode, phase, progress, label }) {
      const palette = variant[theme]
      const ring = palette.ring ?? 'var(--color-breathing-accent)'
      const disc = palette.disc ?? 'var(--color-breathing-accent)'
      const discOn = palette.discOn ?? 'var(--color-breathing-on-accent)'
      const star = palette.star

      const running = mode === 'running'
      const liveScale = phase === 'in'
        ? MIN_SCALE + progress * (MAX_SCALE - MIN_SCALE)
        : MAX_SCALE - progress * (MAX_SCALE - MIN_SCALE)
      const orbScale = running ? liveScale : MID_SCALE

      // South-anchored progress arc (production default ringCue).
      const arcVisible = running
      const r = 49.7
      const south = 50 + r
      const north = 50 - r
      const t = phase === 'in' ? progress : 1 - progress
      let rightD = null, leftD = null
      if (arcVisible && t > 0) {
        if (t >= 1) {
          rightD = `M 50 ${south} A ${r} ${r} 0 0 0 50 ${north}`
          leftD  = `M 50 ${south} A ${r} ${r} 0 0 1 50 ${north}`
        } else {
          const aR = Math.PI / 2 - t * Math.PI
          const aL = Math.PI / 2 + t * Math.PI
          const xR = 50 + r * Math.cos(aR)
          const yR = 50 + r * Math.sin(aR)
          const xL = 50 + r * Math.cos(aL)
          const yL = 50 + r * Math.sin(aL)
          rightD = `M 50 ${south} A ${r} ${r} 0 0 0 ${xR.toFixed(4)} ${yR.toFixed(4)}`
          leftD  = `M 50 ${south} A ${r} ${r} 0 0 1 ${xL.toFixed(4)} ${yL.toFixed(4)}`
        }
      }

      const haloOverride = palette.halos
      return html`
        <div data-variant="orb"
             class="relative grid place-items-center"
             style=${{ width: 'var(--orb-size)', height: 'var(--orb-size)' }}>
          ${running && html`
            <span aria-hidden="true" class="absolute"
                  style=${{ inset: 0, border: `1.5px solid ${ring}`, borderRadius: '50%', opacity: RING_OPACITY }} />
            ${rightD && html`
              <svg aria-hidden="true" class="absolute pointer-events-none"
                   viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
                   style=${{ inset: 0, width: '100%', height: '100%' }}>
                <path d=${rightD} stroke=${ring} fill="none" strokeLinecap="round"
                      strokeWidth=${2.5} vectorEffect="non-scaling-stroke" />
                <path d=${leftD}  stroke=${ring} fill="none" strokeLinecap="round"
                      strokeWidth=${2.5} vectorEffect="non-scaling-stroke" />
              </svg>
            `}
          `}
          <div class="absolute inset-0 flex items-center justify-center"
               style=${{
                 transform: `translate3d(0,0,0) scale(${orbScale})`,
                 transition: running ? 'none' : 'transform 200ms ease-out',
               }}>
            ${V1_HALOS.map((h, i) => html`
              <div key=${i} aria-hidden="true" class="absolute"
                   style=${{
                     width: `${h.pct * 100}%`,
                     height: `${h.pct * 100}%`,
                     borderRadius: h.radius,
                     background: haloOverride[i] ?? `var(--color-orb-halo-${i + 1})`,
                     transform: `translate(${h.shift[0]}px, ${h.shift[1]}px)`,
                   }} />
            `)}
            <div class="absolute flex items-center justify-center"
                 style=${{
                   width: `${DISC_PCT * 100}%`,
                   height: `${DISC_PCT * 100}%`,
                   borderRadius: '50%',
                   background: disc,
                   color: discOn,
                   boxShadow: '0 6px 24px var(--color-border-soft)',
                   transition: 'background 400ms ease-in-out',
                 }}>
              ${/* Star at variant-specified fraction of disc */ null}
              <div style=${{ width: `${star.size * 100}%`, height: `${star.size * 100}%` }}>
                <${StarPath} fill=${star.fill} stroke=${star.stroke} strokeWidth=${star.strokeWidth} />
              </div>
            </div>
          </div>
        </div>
      `
    }

    // ───────────────────────────────────────────────────────────────────────
    // Shared breath clock — drives all variants in lockstep so the comparison
    // is true side-by-side. 6 s in / 6 s out (12 s cycle, ≈ 5 bpm). RAF loop,
    // pauses when mode === 'idle'.
    // ───────────────────────────────────────────────────────────────────────
    function useBreathClock(running) {
      const [tick, setTick] = useState({ phase: 'in', progress: 0 })
      const startRef = useRef(null)
      useEffect(() => {
        if (!running) {
          startRef.current = null
          setTick({ phase: 'in', progress: 0 })
          return
        }
        let raf
        const loop = (now) => {
          if (startRef.current == null) startRef.current = now
          const elapsed = (now - startRef.current) / 1000
          const cycle = 12.0
          const t = (elapsed % cycle) / cycle
          const phase = t < 0.5 ? 'in' : 'out'
          const progress = phase === 'in' ? t / 0.5 : (t - 0.5) / 0.5
          setTick({ phase, progress })
          raf = requestAnimationFrame(loop)
        }
        raf = requestAnimationFrame(loop)
        return () => cancelAnimationFrame(raf)
      }, [running])
      return tick
    }

    // ───────────────────────────────────────────────────────────────────────
    // Harness
    // ───────────────────────────────────────────────────────────────────────
    function App() {
      const [theme, setTheme] = useState('light')
      const [mode, setMode] = useState('running')   // 'running' | 'idle'
      const [shortlist, setShortlist] = useState({})
      const { phase, progress } = useBreathClock(mode === 'running')

      useEffect(() => {
        document.documentElement.classList.toggle('dark', theme === 'dark')
      }, [theme])

      const toggleShortlist = (id) =>
        setShortlist((s) => ({ ...s, [id]: !s[id] }))
      const picked = VARIANTS.filter((v) => shortlist[v.id]).map((v) => v.name)

      return html`
        <div>
          <!-- Harness chrome -->
          <div class="harness">
            <div class="max-w-6xl mx-auto px-5 py-3 flex flex-wrap items-center gap-4">
              <span class="badge">harness</span>
              <span style=${{ fontWeight: 600, color: '#e6e8ed' }}>Spike 012 — Spiritual Eye Orb (Kutastha)</span>
              <div class="flex items-center gap-2 ml-auto">
                <span class="badge">theme</span>
                <button data-active=${theme === 'light'} onClick=${() => setTheme('light')}>Light</button>
                <button data-active=${theme === 'dark'}  onClick=${() => setTheme('dark')}>Dark</button>
              </div>
              <div class="flex items-center gap-2">
                <span class="badge">state</span>
                <button data-active=${mode === 'idle'}     onClick=${() => setMode('idle')}>Idle</button>
                <button data-active=${mode === 'running'}  onClick=${() => setMode('running')}>Running</button>
              </div>
            </div>
            <div class="max-w-6xl mx-auto px-5 pb-3" style=${{ fontSize: '12px', color: '#9aa0ad' }}>
              ${picked.length === 0
                ? 'No shortlist yet — tap a variant\'s pill to mark it.'
                : `Shortlisted: ${picked.join(' · ')}`}
            </div>
          </div>

          <!-- Variants -->
          <div class="max-w-6xl mx-auto px-5 py-8">
            <p style=${{ fontSize: '12px', color: 'var(--color-breathing-text-soft)', marginBottom: '18px', textAlign: 'center' }}>
              All variants share geometry with the production <code>OrbShape</code> (3-layer halo + accent disc + outer ring + south-anchored progress arc). Tap a card's pill to shortlist; toggle theme + state above to audition.
            </p>
            <div class="grid gap-5"
                 style=${{ gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))' }}>
              ${VARIANTS.map((v) => html`
                <div key=${v.id} class="card">
                  <div class="name">${v.name}</div>
                  <${VariantOrb}
                     variant=${v}
                     theme=${theme}
                     mode=${mode}
                     phase=${phase}
                     progress=${progress} />
                  <div class="desc">${v.desc}</div>
                  <div class="shortlist"
                       data-on=${!!shortlist[v.id]}
                       onClick=${() => toggleShortlist(v.id)}>
                    ${shortlist[v.id] ? '✓ shortlisted' : '+ shortlist'}
                  </div>
                </div>
              `)}
            </div>

            <!-- Reference orb (production unchanged) for anchor comparison -->
            <div style=${{ marginTop: '40px', borderTop: '1px solid var(--color-border-soft)', paddingTop: '24px' }}>
              <p style=${{ fontSize: '11px', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--color-breathing-text-soft)', textAlign: 'center', marginBottom: '14px' }}>
                Reference — production orb (no star)
              </p>
              <div class="card" style=${{ maxWidth: '300px', margin: '0 auto' }}>
                <${ReferenceOrb} theme=${theme} mode=${mode} phase=${phase} progress=${progress} />
                <div class="desc">Current shipped orb. Same geometry, no kutastha star — for visual-weight anchor.</div>
              </div>
            </div>
          </div>
        </div>
      `
    }

    function ReferenceOrb({ theme, mode, phase, progress }) {
      // Same geometry but renders nothing inside the disc — matches what
      // BreathingSessionSurface produces at Idle (frame === null, idleMode = still).
      const running = mode === 'running'
      const liveScale = phase === 'in'
        ? MIN_SCALE + progress * (MAX_SCALE - MIN_SCALE)
        : MAX_SCALE - progress * (MAX_SCALE - MIN_SCALE)
      const orbScale = running ? liveScale : MID_SCALE
      const r = 49.7
      const south = 50 + r
      const north = 50 - r
      const t = phase === 'in' ? progress : 1 - progress
      let rightD = null, leftD = null
      if (running && t > 0) {
        if (t >= 1) {
          rightD = `M 50 ${south} A ${r} ${r} 0 0 0 50 ${north}`
          leftD  = `M 50 ${south} A ${r} ${r} 0 0 1 50 ${north}`
        } else {
          const aR = Math.PI / 2 - t * Math.PI
          const aL = Math.PI / 2 + t * Math.PI
          rightD = `M 50 ${south} A ${r} ${r} 0 0 0 ${(50 + r * Math.cos(aR)).toFixed(4)} ${(50 + r * Math.sin(aR)).toFixed(4)}`
          leftD  = `M 50 ${south} A ${r} ${r} 0 0 1 ${(50 + r * Math.cos(aL)).toFixed(4)} ${(50 + r * Math.sin(aL)).toFixed(4)}`
        }
      }
      return html`
        <div class="relative grid place-items-center"
             style=${{ width: 'var(--orb-size)', height: 'var(--orb-size)' }}>
          ${running && html`
            <span aria-hidden="true" class="absolute"
                  style=${{ inset: 0, border: '1.5px solid var(--color-breathing-accent)', borderRadius: '50%', opacity: RING_OPACITY }} />
            <svg aria-hidden="true" class="absolute pointer-events-none"
                 viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
                 style=${{ inset: 0, width: '100%', height: '100%' }}>
              <path d=${rightD} stroke="var(--color-breathing-accent)" fill="none" strokeLinecap="round" strokeWidth=${2.5} vectorEffect="non-scaling-stroke" />
              <path d=${leftD}  stroke="var(--color-breathing-accent)" fill="none" strokeLinecap="round" strokeWidth=${2.5} vectorEffect="non-scaling-stroke" />
            </svg>
          `}
          <div class="absolute inset-0 flex items-center justify-center"
               style=${{ transform: `translate3d(0,0,0) scale(${orbScale})` }}>
            ${V1_HALOS.map((h, i) => html`
              <div key=${i} aria-hidden="true" class="absolute"
                   style=${{
                     width: `${h.pct * 100}%`,
                     height: `${h.pct * 100}%`,
                     borderRadius: h.radius,
                     background: `var(--color-orb-halo-${i + 1})`,
                     transform: `translate(${h.shift[0]}px, ${h.shift[1]}px)`,
                   }} />
            `)}
            <div class="absolute"
                 style=${{
                   width: `${DISC_PCT * 100}%`,
                   height: `${DISC_PCT * 100}%`,
                   borderRadius: '50%',
                   background: 'var(--color-breathing-accent)',
                   boxShadow: '0 6px 24px var(--color-border-soft)',
                 }} />
          </div>
        </div>
      `
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
