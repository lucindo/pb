<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike 004 — Countdown Beep Alternatives</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    @keyframes pulse-ring { 0% { transform: scale(0.85); opacity: 0.9 } 100% { transform: scale(1.6); opacity: 0 } }
    .ring { animation: pulse-ring 0.6s ease-out }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
  <div id="root"></div>

  <script type="module">
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@19.0.0'
    import { createRoot } from 'https://esm.sh/react-dom@19.0.0/client'
    import htm from 'https://esm.sh/htm@3.1.1'
    const html = htm.bind(React.createElement)

    // ───────────────────────────────────────────────────────────────
    // Audio synthesis — mirrors src/audio/nkCueSynth.ts buildNKToneNodes:
    // single (or multi-partial) oscillator → lowpass filter → strike-decay
    // envelope (setTargetAtTime). No audio files. The production countdown
    // beep is `scheduleCountdownTick` — variant 'current' reproduces it
    // exactly (440 Hz sine, 0.12 s, peak 0.08, decay tau 0.05).
    // ───────────────────────────────────────────────────────────────

    const TONE_DEFAULTS = { filterQ: 0.7, partials: [{ ratio: 1, gain: 1 }], at: 0 }

    function scheduleTone(ctx, dest, spec, when) {
      const s = { ...TONE_DEFAULTS, ...spec }
      const filter = ctx.createBiquadFilter()
      filter.type = 'lowpass'
      filter.frequency.value = s.filterFreq
      filter.Q.value = s.filterQ
      const env = ctx.createGain()
      env.gain.setValueAtTime(s.peak, when)
      env.gain.setTargetAtTime(0.0001, when + 0.005, s.tau)
      filter.connect(env)
      env.connect(dest)
      const stopAt = when + s.dur
      for (const p of s.partials) {
        const osc = ctx.createOscillator()
        osc.type = s.type
        osc.frequency.setValueAtTime(s.freq * p.ratio, when)
        if (s.freqEnd != null) {
          osc.frequency.linearRampToValueAtTime(s.freqEnd * p.ratio, when + s.dur)
        }
        const pg = ctx.createGain()
        pg.gain.value = p.gain
        osc.connect(pg)
        pg.connect(filter)
        osc.start(when)
        osc.stop(stopAt + 0.05)
      }
      return stopAt
    }

    function scheduleVariant(ctx, dest, variant, when) {
      let end = when
      for (const tone of variant.tones) {
        const e = scheduleTone(ctx, dest, tone, when + (tone.at || 0))
        if (e > end) end = e
      }
      return end
    }

    // ───────────────────────────────────────────────────────────────
    // The candidate beeps. 'current' MUST stay byte-faithful to the app.
    // ───────────────────────────────────────────────────────────────
    const VARIANTS = [
      {
        id: 'current', name: 'Current', tag: 'baseline',
        desc: '440 Hz sine, 0.12 s, peak 0.08. The exact beep shipping today (scheduleCountdownTick).',
        tones: [{ type: 'sine', freq: 440, filterFreq: 3000, peak: 0.08, dur: 0.12, tau: 0.05 }],
      },
      {
        id: 'louder', name: 'Current · louder', tag: 'tweak',
        desc: 'Identical shape and pitch — peak gain raised 0.08 → 0.13. The "a little bit louder" ask, nothing else changed.',
        tones: [{ type: 'sine', freq: 440, filterFreq: 3000, peak: 0.13, dur: 0.12, tau: 0.05 }],
      },
      {
        id: 'crisp', name: 'Crisp ping', tag: 'alternative',
        desc: 'Higher 660 Hz sine, brighter filter, snappy 0.04 s decay — cuts through, more alerting.',
        tones: [{ type: 'sine', freq: 660, filterFreq: 6000, peak: 0.12, dur: 0.10, tau: 0.04 }],
      },
      {
        id: 'wood', name: 'Wood tick', tag: 'alternative',
        desc: 'Low 300 Hz triangle through a tight resonant filter — dry, percussive, woodblock-ish.',
        tones: [{ type: 'triangle', freq: 300, filterFreq: 1500, filterQ: 5, peak: 0.17, dur: 0.08, tau: 0.022 }],
      },
      {
        id: 'bell', name: 'Bell pip', tag: 'alternative',
        desc: 'Short struck bell — fundamental + inharmonic 2.76× partial, gentle 0.6 s ring-out. Warm.',
        tones: [{
          type: 'sine', freq: 523,
          partials: [{ ratio: 1, gain: 1 }, { ratio: 2.76, gain: 0.32 }],
          filterFreq: 6000, peak: 0.11, dur: 0.6, tau: 0.17,
        }],
      },
      {
        id: 'double', name: 'Double blip', tag: 'alternative',
        desc: 'Two quick pips per count, low → high (392 → 588 Hz) — unmistakably a "counting down" gesture.',
        tones: [
          { at: 0.0,  type: 'sine', freq: 392, filterFreq: 4000, peak: 0.12, dur: 0.07, tau: 0.03 },
          { at: 0.12, type: 'sine', freq: 588, filterFreq: 4500, peak: 0.12, dur: 0.07, tau: 0.03 },
        ],
      },
      {
        id: 'rising', name: 'Rising pip', tag: 'alternative',
        desc: 'Single sine gliding 440 → 580 Hz over 0.16 s — a gentle upward "get ready" lift.',
        tones: [{ type: 'sine', freq: 440, freqEnd: 580, filterFreq: 5000, peak: 0.11, dur: 0.16, tau: 0.07 }],
      },
    ]

    // Deterministic loudness measurement — render one beep offline and read
    // true peak + RMS. Independent of OS/browser volume, so the loudness
    // comparison is an honest claim, not a guess (CONVENTIONS: verifiable claims).
    async function measure(variant) {
      const sr = 48000
      const off = new OfflineAudioContext(1, sr * 2, sr)
      scheduleVariant(off, off.destination, variant, 0)
      const buf = await off.startRendering()
      const d = buf.getChannelData(0)
      let peak = 0, sq = 0
      for (let i = 0; i < d.length; i++) {
        const a = Math.abs(d[i])
        if (a > peak) peak = a
        sq += d[i] * d[i]
      }
      return { peak, rms: Math.sqrt(sq / d.length) }
    }

    const dbRel = (p, ref) => 20 * Math.log10(p / ref)
    const fmtDb = (v) => (v >= 0 ? '+' : '') + v.toFixed(1) + ' dB'

    // ───────────────────────────────────────────────────────────────
    function App() {
      const ctxRef = useRef(null)
      const timersRef = useRef([])
      const [measures, setMeasures] = useState({})
      const [playing, setPlaying] = useState(null)   // variant id currently sounding
      const [seqStep, setSeqStep] = useState(-1)      // 0,1,2 during a 3-2-1 sequence
      const [selected, setSelected] = useState({ current: true })
      const [log, setLog] = useState([])

      useEffect(() => {
        let cancelled = false
        ;(async () => {
          const out = {}
          for (const v of VARIANTS) out[v.id] = await measure(v)
          if (!cancelled) setMeasures(out)
        })()
        return () => { cancelled = true }
      }, [])

      const getCtx = () => {
        if (!ctxRef.current) {
          const AC = window.AudioContext || window.webkitAudioContext
          ctxRef.current = new AC()
        }
        if (ctxRef.current.state === 'suspended') ctxRef.current.resume()
        return ctxRef.current
      }

      const addLog = (msg, meta) => setLog((l) =>
        [{ t: new Date().toLocaleTimeString(), msg, meta }, ...l].slice(0, 40))

      const clearTimers = () => { timersRef.current.forEach(clearTimeout); timersRef.current = [] }

      const playSingle = (v) => {
        const ctx = getCtx()
        scheduleVariant(ctx, ctx.destination, v, ctx.currentTime + 0.04)
        clearTimers()
        setPlaying(v.id); setSeqStep(-1)
        timersRef.current.push(setTimeout(() => setPlaying(null), 700))
        const m = measures[v.id]
        addLog(`single · ${v.name}`, m ? fmtDb(dbRel(m.peak, measures.current.peak)) + ' vs current' : '')
      }

      const playSequence = (v) => {
        const ctx = getCtx()
        const t0 = ctx.currentTime + 0.06
        for (let i = 0; i < 3; i++) scheduleVariant(ctx, ctx.destination, v, t0 + i)
        clearTimers()
        setPlaying(v.id)
        for (let i = 0; i < 3; i++) timersRef.current.push(setTimeout(() => setSeqStep(i), i * 1000))
        timersRef.current.push(setTimeout(() => { setPlaying(null); setSeqStep(-1) }, 3400))
        addLog(`3-2-1 lead-in · ${v.name}`)
      }

      const playAB = (v) => {
        const ctx = getCtx()
        const t0 = ctx.currentTime + 0.05
        scheduleVariant(ctx, ctx.destination, VARIANTS[0], t0)
        scheduleVariant(ctx, ctx.destination, v, t0 + 0.85)
        clearTimers()
        setPlaying(v.id); setSeqStep(-1)
        timersRef.current.push(setTimeout(() => setPlaying(null), 1300))
        addLog(`A/B · Current → ${v.name}`)
      }

      const toggleSelect = (id) =>
        setSelected((s) => ({ ...s, [id]: !s[id] }))

      const curPeak = measures.current ? measures.current.peak : null
      const maxPeak = Object.values(measures).reduce((m, x) => Math.max(m, x.peak), 0.0001)
      const selectedList = VARIANTS.filter((v) => selected[v.id])

      return html`
        <div class="min-h-screen">
          <!-- harness bar — NOT part of the product -->
          <div class="bg-black/80 border-b border-amber-500/30 px-4 py-1.5 text-[11px] tracking-wide text-amber-400/80 font-mono">
            SPIKE HARNESS · 004-countdown-beep-alternatives · not shipped UI — a sound-design workbench
          </div>

          <div class="max-w-3xl mx-auto px-5 py-8">
            <header class="mb-7">
              <h1 class="text-2xl font-semibold text-slate-100">Countdown beep alternatives</h1>
              <p class="mt-2 text-sm text-slate-400 leading-relaxed">
                The 3-2-1 lead-in beep before a session starts. Audition the current beep against
                alternatives, A/B them, and check loudness. Loudness bars are
                <span class="text-slate-300">measured offline</span> — true peak amplitude,
                independent of your device volume. Audible playback still depends on your volume,
                so turn it to a normal listening level first.
              </p>
            </header>

            <!-- now playing -->
            <div class="h-12 mb-5 flex items-center">
              ${playing ? html`
                <div class="flex items-center gap-3">
                  <span class="text-xs uppercase tracking-widest text-slate-500">now playing</span>
                  <span class="text-sm text-cyan-300 font-medium">
                    ${VARIANTS.find((v) => v.id === playing).name}
                  </span>
                  ${seqStep >= 0 ? html`
                    <span class="flex gap-1.5 ml-1">
                      ${[0, 1, 2].map((i) => html`
                        <span key=${i} class=${'w-7 h-7 rounded-full grid place-items-center text-sm font-semibold transition-colors '
                          + (i === seqStep ? 'bg-cyan-400 text-slate-950' : 'bg-slate-800 text-slate-600')}>
                          ${3 - i}
                        </span>`)}
                    </span>` : null}
                </div>
              ` : html`<span class="text-xs text-slate-600">— silent —</span>`}
            </div>

            <!-- variant cards -->
            <div class="space-y-3">
              ${VARIANTS.map((v) => {
                const m = measures[v.id]
                const isSel = !!selected[v.id]
                const isPlaying = playing === v.id
                const rel = m && curPeak ? dbRel(m.peak, curPeak) : null
                return html`
                  <div key=${v.id} class=${'rounded-xl border px-4 py-3.5 transition-colors '
                    + (isPlaying ? 'border-cyan-400/70 bg-cyan-950/30 ' : 'border-slate-800 bg-slate-900/60 ')
                    + (isSel ? 'ring-1 ring-emerald-500/40' : '')}>
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <div class="flex items-center gap-2">
                          <span class="font-medium text-slate-100">${v.name}</span>
                          <span class=${'text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded '
                            + (v.tag === 'baseline' ? 'bg-slate-700 text-slate-300'
                              : v.tag === 'tweak' ? 'bg-indigo-500/30 text-indigo-300'
                              : 'bg-slate-800 text-slate-400')}>${v.tag}</span>
                        </div>
                        <p class="mt-1 text-[13px] text-slate-400 leading-snug">${v.desc}</p>
                      </div>
                      <button onClick=${() => toggleSelect(v.id)}
                        class=${'shrink-0 text-[11px] px-2.5 py-1 rounded-md border transition-colors '
                          + (isSel ? 'border-emerald-500/60 bg-emerald-500/15 text-emerald-300'
                            : 'border-slate-700 text-slate-500 hover:border-slate-500')}>
                        ${isSel ? '✓ in picker' : '+ picker'}
                      </button>
                    </div>

                    <!-- loudness bar -->
                    <div class="mt-3 flex items-center gap-3">
                      <div class="flex-1 h-2 rounded-full bg-slate-800 overflow-hidden">
                        <div class=${'h-full rounded-full ' + (v.id === 'current' ? 'bg-slate-400' : 'bg-cyan-500')}
                          style=${{ width: m ? (m.peak / maxPeak * 100).toFixed(1) + '%' : '0%' }}></div>
                      </div>
                      <span class="text-[11px] font-mono text-slate-500 w-32 text-right">
                        ${m ? html`peak ${m.peak.toFixed(3)} · ${v.id === 'current' ? 'reference' : fmtDb(rel)}` : 'measuring…'}
                      </span>
                    </div>

                    <!-- controls -->
                    <div class="mt-3 flex flex-wrap gap-2">
                      <button onClick=${() => playSequence(v)}
                        class="px-3 py-1.5 rounded-md bg-cyan-600 hover:bg-cyan-500 text-slate-950 text-[13px] font-medium">
                        ▶ Play 3-2-1
                      </button>
                      <button onClick=${() => playSingle(v)}
                        class="px-3 py-1.5 rounded-md bg-slate-800 hover:bg-slate-700 text-slate-200 text-[13px]">
                        • Single beep
                      </button>
                      ${v.id !== 'current' ? html`
                        <button onClick=${() => playAB(v)}
                          class="px-3 py-1.5 rounded-md bg-slate-800 hover:bg-slate-700 text-slate-300 text-[13px]">
                          A/B vs Current
                        </button>` : null}
                    </div>
                  </div>`
              })}
            </div>

            <!-- picker summary -->
            <div class="mt-7 rounded-xl border border-emerald-700/40 bg-emerald-950/20 px-4 py-3.5">
              <div class="text-xs uppercase tracking-widest text-emerald-400/80 mb-1.5">
                Selected for the settings picker
              </div>
              ${selectedList.length === 0
                ? html`<p class="text-sm text-slate-500">Nothing selected. Toggle "+ picker" on the beeps worth shipping.</p>`
                : html`<p class="text-sm text-slate-200">
                    ${selectedList.map((v) => v.name).join(' · ')}
                    <span class="text-slate-500"> — ${selectedList.length} option${selectedList.length === 1 ? '' : 's'}</span>
                  </p>`}
            </div>

            <!-- event log -->
            <div class="mt-6">
              <div class="text-xs uppercase tracking-widest text-slate-500 mb-2">Event log</div>
              <div class="rounded-lg border border-slate-800 bg-slate-900/60 max-h-52 overflow-y-auto font-mono text-[12px]">
                ${log.length === 0
                  ? html`<div class="px-3 py-2 text-slate-600">No events yet — play a beep.</div>`
                  : log.map((e, i) => html`
                      <div key=${i} class="px-3 py-1.5 border-b border-slate-800/60 flex gap-3">
                        <span class="text-slate-600">${e.t}</span>
                        <span class="text-slate-300">${e.msg}</span>
                        ${e.meta ? html`<span class="text-cyan-500/80 ml-auto">${e.meta}</span>` : null}
                      </div>`)}
              </div>
            </div>

            <footer class="mt-8 text-[12px] text-slate-600 leading-relaxed">
              Production seam: <span class="text-slate-500 font-mono">scheduleCountdownTick</span> in
              <span class="text-slate-500 font-mono">src/audio/nkCueSynth.ts</span> — already split onto
              its own constants from the per-OM tick, so a beep swap lands here without touching anything else.
            </footer>
          </div>
        </div>`
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
