<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike 007 — Three-Practice Switcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
  <div id="root"></div>

  <script type="module">
    import React, { useState } from 'https://esm.sh/react@19.0.0'
    import { createRoot } from 'https://esm.sh/react-dom@19.0.0/client'
    import htm from 'https://esm.sh/htm@3.1.1'
    const html = htm.bind(React.createElement)

    // ───────────────────────────────────────────────────────────────
    // Theme tokens — verbatim from src/styles/theme.css. The switcher's
    // appearance is theme-dependent: on dark/dusk bg-soft === surface, so
    // the active pill is told apart only by its accent border (the real
    // PracticeToggle.tsx convention — reproduced faithfully here).
    // ───────────────────────────────────────────────────────────────
    const THEMES = {
      light: { bg: '#eceff4', bgSoft: '#e5e9f0', surface: '#ffffff', accent: '#81a1c1', accentStrong: '#5e81ac', muted: '#81a1c1', text: '#2e3440' },
      dark:  { bg: '#2e3440', bgSoft: '#3b4252', surface: '#3b4252', accent: '#85b1c9', accentStrong: '#81a1c1', muted: '#a0a8b6', text: '#e5e9f0' },
      moss:  { bg: '#fdf6e3', bgSoft: '#f4f0d9', surface: '#ffffff', accent: '#79b595', accentStrong: '#35a77c', muted: '#829181', text: '#3b4252' },
      slate: { bg: '#e1e2e7', bgSoft: '#d0d5e3', surface: '#ffffff', accent: '#7890dd', accentStrong: '#3760bf', muted: '#68709a', text: '#2e3440' },
      dusk:  { bg: '#191724', bgSoft: '#1f1d2e', surface: '#1f1d2e', accent: '#ebcfb6', accentStrong: '#f6c177', muted: '#908caa', text: '#e0def4' },
    }
    const THEME_IDS = ['light', 'dark', 'moss', 'slate', 'dusk']

    // Practice labels. EN is shipping today (HRV / Navi); "Stretch" is the new
    // promoted practice. PT-BR "Alongar" is the real width-stress label.
    const PRACTICES = {
      en:   [{ id: 'hrv', label: 'HRV' }, { id: 'stretch', label: 'Stretch' }, { id: 'navi', label: 'Navi' }],
      ptBR: [{ id: 'hrv', label: 'VFC' }, { id: 'stretch', label: 'Alongar' }, { id: 'navi', label: 'Navi' }],
    }

    // Treatment-B glyphs (18×18, inherit pill text color via currentColor).
    const GLYPHS = {
      hrv:     '<circle cx="9" cy="9" r="6" fill="currentColor" fill-opacity="0.9"/>',
      stretch: '<path d="M2 13 Q5.5 2 9 9 T16 5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
      navi:    '<circle cx="4" cy="9" r="2" fill="currentColor"/><circle cx="9" cy="9" r="2" fill="currentColor"/><circle cx="14" cy="9" r="2" fill="currentColor"/>',
    }
    const Glyph = ({ id }) => html`
      <svg viewBox="0 0 18 18" width="17" height="17" style=${{ display: 'block' }}
        dangerouslySetInnerHTML=${{ __html: GLYPHS[id] }}></svg>`

    // ───────────────────────────────────────────────────────────────
    // Faithful reproduction of src/components/PracticeToggle.tsx.
    // treatment: 'text' (today's component, extended to 3 pills) | 'icon'.
    // ───────────────────────────────────────────────────────────────
    function Switcher({ practices, active, disabled, treatment, theme, onSwitch }) {
      const t = THEMES[theme]
      return html`
        <div role="group" aria-label="Practice"
          style=${{
            display: 'flex', borderRadius: '9999px',
            border: `1px solid ${t.muted}`, background: t.bgSoft, padding: '4px',
            opacity: disabled ? 0.5 : 1, gap: '0px',
          }}>
          ${practices.map((p) => {
            const isActive = active === p.id
            return html`
              <button key=${p.id} type="button" disabled=${disabled}
                onClick=${() => !disabled && onSwitch(p.id)}
                style=${{
                  flex: '1 1 0', minWidth: 0,
                  display: 'flex', flexDirection: treatment === 'icon' ? 'column' : 'row',
                  alignItems: 'center', justifyContent: 'center', gap: '3px',
                  borderRadius: '9999px',
                  minHeight: treatment === 'icon' ? '52px' : '44px',
                  border: `1px solid ${isActive ? t.accent : 'transparent'}`,
                  padding: treatment === 'icon' ? '6px 8px' : '8px 16px',
                  fontSize: '14px', lineHeight: '1.1',
                  fontWeight: isActive ? 600 : 400,
                  background: isActive ? t.surface : 'transparent',
                  color: isActive ? t.accentStrong : t.muted,
                  boxShadow: isActive ? '0 1px 2px rgba(0,0,0,0.22)' : 'none',
                  cursor: disabled ? 'not-allowed' : 'pointer',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                }}>
                ${treatment === 'icon' ? html`<${Glyph} id=${p.id} />` : null}
                <span style=${{ overflow: 'hidden', textOverflow: 'ellipsis' }}>${p.label}</span>
              </button>`
          })}
        </div>`
    }

    // The app card + a faux orb, so the switcher is judged in context.
    function AppCard({ theme, practices, active, disabled, onSwitch, narrow }) {
      const t = THEMES[theme]
      const pad = narrow ? 20 : 24
      return html`
        <div style=${{
          background: t.surface, border: `1px solid ${t.bgSoft}`,
          borderRadius: '32px', padding: pad + 'px',
          boxShadow: '0 18px 40px rgba(0,0,0,0.18)',
        }}>
          <div style=${{ fontSize: '10px', letterSpacing: '0.08em', textTransform: 'uppercase', color: t.muted, marginBottom: '5px' }}>
            A — text labels
          </div>
          <${Switcher} practices=${practices} active=${active} disabled=${disabled}
            treatment="text" theme=${theme} onSwitch=${onSwitch} />
          <div style=${{ fontSize: '10px', letterSpacing: '0.08em', textTransform: 'uppercase', color: t.muted, margin: '14px 0 5px' }}>
            B — icon + label
          </div>
          <${Switcher} practices=${practices} active=${active} disabled=${disabled}
            treatment="icon" theme=${theme} onSwitch=${onSwitch} />
          <!-- faux orb -->
          <div style=${{ display: 'flex', justifyContent: 'center', padding: '26px 0 8px' }}>
            <div style=${{
              width: '128px', height: '128px', borderRadius: '50%',
              background: `radial-gradient(circle at 50% 42%, ${t.surface}, ${t.accent} 70%, ${t.accentStrong})`,
              boxShadow: `0 0 38px ${t.accent}55`,
            }}></div>
          </div>
          <div style=${{
            textAlign: 'center', fontSize: '13px', color: t.muted, marginTop: '2px',
          }}>${disabled ? 'Session in progress — switcher locked' : 'Tap a practice, then Start'}</div>
        </div>`
    }

    const WIDTHS = [
      { id: 320, label: '320 — small phone' },
      { id: 360, label: '360 — common Android' },
      { id: 390, label: '390 — iPhone' },
      { id: 'desktop', label: 'Desktop' },
    ]

    function App() {
      const [width, setWidth] = useState(360)
      const [theme, setTheme] = useState('dark')
      const [locale, setLocale] = useState('en')
      const [disabled, setDisabled] = useState(false)
      const [active, setActive] = useState('hrv')

      const t = THEMES[theme]
      const practices = PRACTICES[locale]
      const isDesktop = width === 'desktop'
      const screenW = isDesktop ? 480 : width

      // Computed pill geometry — the "does it fit" question as numbers.
      const cardPad = (!isDesktop && width === 320) ? 20 : 24
      const cardOuter = screenW - 28          // page side margins
      const cardInner = cardOuter - cardPad * 2
      const switcherInner = cardInner - 8     // container p-1 (4px each side)
      const pillW = switcherInner / 3
      const textSpace = pillW - 32            // px-4 (16px each side)

      const Seg = ({ value, current, set, children }) => html`
        <button onClick=${() => set(value)}
          class=${'px-3 py-1 rounded-md text-[12px] transition-colors '
            + (value === current ? 'bg-cyan-600 text-slate-950 font-medium' : 'bg-slate-800 text-slate-300 hover:bg-slate-700')}>
          ${children}
        </button>`

      // device frame
      const bezel = isDesktop ? 0 : 12
      const frame = html`
        <div style=${{
          width: (screenW + bezel * 2) + 'px',
          background: isDesktop ? '#0c0f16' : '#0a0c12',
          borderRadius: isDesktop ? '14px' : '44px',
          padding: bezel + 'px',
          border: isDesktop ? '1px solid #2a3140' : '2px solid #1a1f2b',
          boxShadow: '0 24px 60px rgba(0,0,0,0.6)',
        }}>
          <div style=${{
            width: screenW + 'px', background: t.bg,
            borderRadius: isDesktop ? '6px' : '34px', overflow: 'hidden',
          }}>
            <!-- status / chrome bar -->
            <div style=${{
              height: isDesktop ? '30px' : '34px', display: 'flex', alignItems: 'center',
              justifyContent: isDesktop ? 'flex-start' : 'center', gap: '6px',
              padding: '0 14px',
            }}>
              ${isDesktop
                ? html`<span style=${{ width: '9px', height: '9px', borderRadius: '50%', background: '#e0686b' }}></span>
                       <span style=${{ width: '9px', height: '9px', borderRadius: '50%', background: '#e6b25a' }}></span>
                       <span style=${{ width: '9px', height: '9px', borderRadius: '50%', background: '#73c990' }}></span>`
                : html`<div style=${{ width: '110px', height: '20px', background: '#0a0c12', borderRadius: '0 0 14px 14px' }}></div>`}
            </div>
            <!-- app -->
            <div style=${{ padding: '14px', paddingTop: '4px' }}>
              <div style=${{
                textAlign: 'center', fontSize: '13px', fontWeight: 600,
                color: t.text, padding: '6px 0 14px',
              }}>HRV Breathing</div>
              <${AppCard} theme=${theme} practices=${practices} active=${active}
                disabled=${disabled} narrow=${width === 320}
                onSwitch=${setActive} />
            </div>
          </div>
        </div>`

      return html`
        <div class="min-h-screen">
          <div class="bg-black/80 border-b border-amber-500/30 px-4 py-1.5 text-[11px] tracking-wide text-amber-400/80 font-mono">
            SPIKE HARNESS · 007-three-practice-switcher · not shipped UI — a layout workbench
          </div>

          <div class="max-w-5xl mx-auto px-5 py-8">
            <header class="mb-6">
              <h1 class="text-2xl font-semibold text-slate-100">Three-practice switcher</h1>
              <p class="mt-2 text-sm text-slate-400 leading-relaxed">
                Stretch promoted from an HRV <em>mode</em> to a top-level <em>practice</em> — the
                switcher now carries <span class="text-slate-300">HRV · Stretch · Navi</span>. This is
                a faithful render of <span class="font-mono text-slate-300">PracticeToggle.tsx</span>
                (real theme tokens) inside true-size device frames. Treatment <strong>A</strong> is
                today's component extended to three pills; <strong>B</strong> adds a glyph per pill.
                Switch width, theme, and locale to stress the fit — PT-BR "Alongar" is the widest label.
              </p>
            </header>

            <!-- controls -->
            <div class="flex flex-wrap gap-x-6 gap-y-3 mb-6 p-3 rounded-lg border border-slate-800 bg-slate-900/60">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-[11px] uppercase tracking-wider text-slate-500">Width</span>
                ${WIDTHS.map((w) => Seg({ value: w.id, current: width, set: setWidth, children: w.label }))}
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[11px] uppercase tracking-wider text-slate-500">Theme</span>
                ${THEME_IDS.map((id) => Seg({ value: id, current: theme, set: setTheme, children: id }))}
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[11px] uppercase tracking-wider text-slate-500">Locale</span>
                ${Seg({ value: 'en', current: locale, set: setLocale, children: 'EN' })}
                ${Seg({ value: 'ptBR', current: locale, set: setLocale, children: 'PT-BR' })}
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[11px] uppercase tracking-wider text-slate-500">State</span>
                ${Seg({ value: false, current: disabled, set: setDisabled, children: 'Idle' })}
                ${Seg({ value: true, current: disabled, set: setDisabled, children: 'In session' })}
              </div>
            </div>

            <!-- computed fit readout -->
            <div class="mb-6 rounded-lg border border-slate-800 bg-slate-900/60 px-4 py-2.5 font-mono text-[12px] text-slate-400">
              <span class="text-slate-500">fit @ ${isDesktop ? 'desktop 480' : width + 'px'}:</span>
              card inner ${cardInner.toFixed(0)}px ·
              <span class="text-cyan-400">pill ${pillW.toFixed(0)}px</span> ·
              text space ${textSpace.toFixed(0)}px
              <span class="text-slate-500"> — "Stretch" needs ~52px, "Alongar" ~62px @ 14px</span>
              ${textSpace < 62 ? html`<span class="text-amber-400"> · tight for "Alongar"</span>` : null}
              ${textSpace < 52 ? html`<span class="text-red-400"> · "Stretch" at risk</span>` : null}
            </div>

            <!-- hero device frame -->
            <div class="flex justify-center py-4">
              ${frame}
            </div>

            <footer class="mt-8 text-[12px] text-slate-600 leading-relaxed">
              Production: <span class="text-slate-500 font-mono">PracticeToggle.tsx</span> grows from 2
              to 3 pills; <span class="text-slate-500 font-mono">PracticeId</span> gains
              <span class="text-slate-500 font-mono">'stretch'</span>; Stretch stops being an HRV
              <span class="text-slate-500 font-mono">mode</span> and becomes its own practice slice
              (settings + stats). Spike 002 validated the top segmented control for ~3–4 practices —
              this confirms the 3-practice instance at real mobile widths.
            </footer>
          </div>
        </div>`
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
