name: Deploy to GitHub Pages

# WARNING: do not add push: branches: [main] — would cause the append-versions-json job's commit-back to re-trigger deploys, creating an infinite loop. The [skip ci] tag in that commit is defense-in-depth, but the structural guarantee is the missing branches trigger.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      pkg_version: ${{ steps.read.outputs.pkg_version }}
      pkg_version_short: ${{ steps.read.outputs.pkg_version_short }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - id: read
        name: Read package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_VERSION_SHORT="v$(echo "$PKG_VERSION" | cut -d. -f1,2)"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_version_short=$PKG_VERSION_SHORT" >> "$GITHUB_OUTPUT"
          echo "Read package.json version: $PKG_VERSION (short: $PKG_VERSION_SHORT)"
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        # Context values pass through env, never inlined into the script body:
        # a tag name (github.ref_name) can contain shell metacharacters, so
        # `ACTUAL_TAG="${{ github.ref_name }}"` would be a script-injection sink.
        env:
          EXPECTED_TAG: ${{ steps.read.outputs.pkg_version_short }}
          ACTUAL_TAG: ${{ github.ref_name }}
          PKG_VERSION: ${{ steps.read.outputs.pkg_version }}
        run: |
          # Compare the pushed tag (short form like `v2.0`) against the short
          # form derived from package.json.version (`2.0.0` → `v2.0`). The
          # short form is the project's tag + versioned-subpath convention
          # (see versions.json schema regex). package.json stays full SemVer
          # for npm compatibility.
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "ERROR: pushed tag '$ACTUAL_TAG' does not match short form '$EXPECTED_TAG' derived from package.json.version '$PKG_VERSION'" >&2
            echo "Adjust package.json.version (its first two segments form the tag) or re-tag before pushing." >&2
            exit 1
          fi
          echo "Tag match OK: $ACTUAL_TAG == $EXPECTED_TAG (package.json.version: $PKG_VERSION)"

  read-manifest:
    runs-on: ubuntu-latest
    outputs:
      official: ${{ steps.read.outputs.official }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: read
        name: Validate and read versions.json
        run: |
          node -e "
            const fs = require('fs');
            let v;
            try { v = JSON.parse(fs.readFileSync('versions.json', 'utf8')); }
            catch (e) { console.error('ERROR: versions.json missing or not valid JSON:', e.message); process.exit(1); }
            const verRe = /^v[0-9]+\.[0-9]+\$/;
            if (typeof v.official !== 'string' || !verRe.test(v.official)) {
              console.error('ERROR: versions.json.official must be a string matching ^v[0-9]+\\\\.[0-9]+\$, got:', JSON.stringify(v.official));
              process.exit(1);
            }
            if (!Array.isArray(v.versions) || !v.versions.every((e) => typeof e === 'string' && verRe.test(e))) {
              console.error('ERROR: versions.json.versions must be an array of strings matching ^v[0-9]+\\\\.[0-9]+\$, got:', JSON.stringify(v.versions));
              process.exit(1);
            }
            console.log('versions.json schema OK; official =', v.official);
          "
          OFFICIAL=$(node -p "JSON.parse(require('fs').readFileSync('versions.json','utf8')).official")
          echo "official=$OFFICIAL" >> "$GITHUB_OUTPUT"

  build-current:
    needs: validate-version
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build current tag at versioned subpath
        # pkg_version_short derives from package.json.version at the checked-out
        # ref; pass via env so it cannot break out of the build command.
        env:
          PKG_VERSION_SHORT: ${{ needs.validate-version.outputs.pkg_version_short }}
        run: npx vite build --base="/pb/${PKG_VERSION_SHORT}/"
      - uses: actions/upload-artifact@v4
        with:
          name: build-current
          path: dist

  build-archives:
    needs: read-manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Future tags get added here when the operator decides to keep archiving them.
        # For now the matrix resolves to: ref: v1.5 — the only archive target, because
        # every earlier v1.x tag is superseded by v1.5 itself (no user-reachable URL
        # needs them).
        tag: ['v1.5']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build archive tag at versioned subpath
        run: npx vite build --base=/pb/${{ matrix.tag }}/
      - uses: actions/upload-artifact@v4
        with:
          name: build-archive-${{ matrix.tag }}
          path: dist

  build-root:
    # Per plan <deviations>: ALWAYS rebuilds the official version at the root path on
    # every push (tag) and workflow_dispatch event. Idempotent against the official
    # tag — re-running on non-official tag pushes is wasted CPU but a no-op for site
    # contents. No conditional skip based on github.ref_name == official.
    needs: read-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.read-manifest.outputs.official }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build official tag at root
        run: npx vite build --base=/pb/
      - uses: actions/upload-artifact@v4
        with:
          name: build-root
          path: dist

  assemble-and-deploy:
    needs: [validate-version, read-manifest, build-current, build-archives, build-root]
    # workflow_dispatch skips build-current (no pushed tag → nothing to build at /pb/v{X.Y}/).
    # This `if:` allows assemble to proceed when build-current was skipped, but still
    # requires build-archives and build-root to have succeeded. This is the only `if:`
    # guard on assemble — the (now-eliminated) build-root skip case is not handled here.
    if: needs.build-archives.result == 'success' && needs.build-root.result == 'success' && (needs.build-current.result == 'success' || needs.build-current.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create assembly directory
        run: mkdir -p site
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble site (root + archives + current)
        # pkg_version_short via env, not inlined — keeps a crafted version string
        # out of the shell.
        env:
          PKG_VERSION_SHORT: ${{ needs.validate-version.outputs.pkg_version_short }}
        run: |
          set -e
          # Copy root build (official tag) to site/ root.
          if [ -d artifacts/build-root ]; then
            cp -R artifacts/build-root/. site/
            echo "Copied build-root to site/"
          else
            echo "ERROR: build-root artifact missing — root would be empty" >&2
            exit 1
          fi
          # Copy each archive build into site/<tag>/.
          for dir in artifacts/build-archive-*; do
            [ -d "$dir" ] || continue
            tag="${dir#artifacts/build-archive-}"
            mkdir -p "site/$tag"
            cp -R "$dir/." "site/$tag/"
            echo "Copied $dir → site/$tag/"
          done
          # Copy current tag (push event only) into site/<pkg_version_short>/.
          if [ -d artifacts/build-current ]; then
            SHORT="$PKG_VERSION_SHORT"
            mkdir -p "site/$SHORT"
            cp -R artifacts/build-current/. "site/$SHORT/"
            echo "Copied build-current → site/$SHORT/"
          else
            echo "build-current artifact absent (workflow_dispatch, no pushed tag) — skipping current-tag stage"
          fi
          ls -la site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

  append-versions-json:
    needs: assemble-and-deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # PAT fallback honors user_setup: if branch protection blocks the default
          # GITHUB_TOKEN, operator supplies secrets.VERSIONS_JSON_PAT (fine-grained,
          # contents:write on this repo).
          token: ${{ secrets.VERSIONS_JSON_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Append pushed tag to versions.json
        # github.ref_name (the pushed tag) is read from process.env inside the
        # Node script — git ref names may contain quotes/`$`/backticks, so
        # inlining `'${{ github.ref_name }}'` into the -e body is an RCE sink.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            const t = process.env.TAG;
            if (!v.versions.includes(t)) {
              v.versions.push(t);
              v.versions.sort();
            }
            fs.writeFileSync('versions.json', JSON.stringify(v, null, 2) + '\n');
          "
      - name: Commit and push if changed
        # TAG via env, not inlined into the shell — same injection guard.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if git diff --quiet versions.json; then
            echo "versions.json unchanged (tag '$TAG' already in list) — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore(release): record $TAG in versions.json [skip ci]"
          git push origin main
